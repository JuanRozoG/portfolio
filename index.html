       PERSONAL V2 — CAROUSEL
       ══════════════════════════════════════════════════════════ -->
  <section class="page page-section page-personal-v2-section" id="page-personal-v2" style="height:100vh;height:100dvh;min-height:100vh;min-height:100dvh;max-height:100vh;max-height:100dvh;overflow:hidden;position:relative;padding-top:0;">
    <div class="page-title-bar personal-v2-title-bar" style="position:absolute;top:0;left:0;right:0;z-index:20;opacity:1;animation:none;transform:none;">
      <h2 class="page-title"><a href="#" class="page-title-link" data-page="intro">Juan Rozo</a></h2>
    </div>
    <div class="personal-v2-carousel" id="personal-v2-carousel"></div>

  <!-- ══════════════════════════════════════════════════════════
       INFO PAGE
       ══════════════════════════════════════════════════════════ -->

  <!-- ══════════════════════════════════════════════════════════
       ARCHIVE — Hidden parallax gallery  (access via #archive)
       ══════════════════════════════════════════════════════════ -->
  <section class="page page-section page-archive-section" id="page-archive">
    <div class="page-title-bar archive-title-bar">
      <h2 class="page-title"><a href="#" class="page-title-link" data-page="intro">Juan Rozo</a></h2>

  <!-- ── FOOTER ──────────────────────────────────────────────── -->
  <footer class="site-footer" id="site-footer"></footer>

  <!-- ── LIGHTBOX (slides up from bottom) ──────────────────── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lightbox-top">
      <span class="lb-counter" id="lb-counter"></span>
      <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    </div>
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Previous">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 4l-8 8 8 8"/></svg>
    </button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lb-img" src="" alt="" />
    </div>
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 4l8 8-8 8"/></svg>
    </button>
    <div class="lightbox-bottom">
      <p class="lightbox-title" id="lb-title"></p>
      <p class="lightbox-subtitle" id="lb-subtitle"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  (() => {
    'use strict';

    /* ════════════════════════════════════════════════════════
       SETUP — populate from config
       ════════════════════════════════════════════════════════ */

    // Intro
    const _introC = CONFIG.pageContent?.intro || {};
    document.getElementById('intro-name').textContent = CONFIG.name;
    document.getElementById('intro-tagline').textContent =
      _introC.tagline || `Melbourne based. ${CONFIG.tagline}. EST 2020`;

    // Intro collage — balanced random mix from People / Things / Personal
    const collageContainer = document.getElementById('intro-collage');

    // Helper: pick N random items from an array
    function pickRandom(arr, n) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, n);
    }

    // Intro collage pool — from the intro page gallery in the CMS.
    // Falls back to CONFIG.projects for backward compatibility.
    const introPool   = CONFIG.pageGalleries?.intro || CONFIG.projects;
    const allPeople   = introPool.filter(p => (p.categories || []).includes('people'));
    const allThings   = introPool.filter(p => (p.categories || []).includes('things'));
    const allPersonal = introPool.filter(p => (p.categories || []).includes('personal'));

    // Pick 3 random from each category for balanced distribution
    const collageImages = [
      ...pickRandom(allPeople, 3),
      ...pickRandom(allThings, 3),
      ...pickRandom(allPersonal, 3),
    ];

    // Shuffle the combined set
    for (let i = collageImages.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [collageImages[i], collageImages[j]] = [collageImages[j], collageImages[i]];
    }

    // ── Organic collage layout engine ────────────────────────
    // Places 9 images in irregular positions using iterative relaxation.
    // Avoids center text zone and prevents all overlaps.
    // Uses natural image aspect ratios to prevent cropping.
    function generateOrganicPositions(naturalRatios) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // Center exclusion zone (name + tagline)
      const cx = vw * 0.5, cy = vh * 0.5;
      // On mobile the exclusion zone must be wider to protect text against larger images
      const _isMobileIntro = vw < 600;
      const exHalfW = vw * (_isMobileIntro ? 0.32 : 0.20);
      const exHalfH = vh * (_isMobileIntro ? 0.18 : 0.12);

      // Image sizes as fraction of vw — varied for organic feel
      // On mobile: ~1.5× larger so photos read well on a small screen
      const widths = _isMobileIntro
        ? [0.225, 0.255, 0.165, 0.195, 0.135, 0.21, 0.24, 0.15, 0.18]
        : [0.15,  0.17,  0.11,  0.13,  0.09,  0.14, 0.16, 0.10, 0.12];
      // Shuffle sizes
      for (let i = widths.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [widths[i], widths[j]] = [widths[j], widths[i]];
      }

      // 9 zone definitions — each covers a distinct region of the viewport.
      // Using zones (instead of fixed anchors) guarantees full-viewport
      // coverage while producing a different composition on every load.
      const zoneDefs = [
        { xMin: 0.01, xMax: 0.20, yMin: 0.02, yMax: 0.28 },  // top-left
        { xMin: 0.22, xMax: 0.46, yMin: 0.02, yMax: 0.22 },  // top-center-left
        { xMin: 0.65, xMax: 0.88, yMin: 0.02, yMax: 0.28 },  // top-right
        { xMin: 0.01, xMax: 0.15, yMin: 0.32, yMax: 0.64 },  // mid-left
        { xMin: 0.75, xMax: 0.90, yMin: 0.32, yMax: 0.64 },  // mid-right
        { xMin: 0.01, xMax: 0.20, yMin: 0.68, yMax: 0.90 },  // bottom-left
        { xMin: 0.22, xMax: 0.44, yMin: 0.72, yMax: 0.93 },  // bottom-center-left
        { xMin: 0.46, xMax: 0.66, yMin: 0.70, yMax: 0.93 },  // bottom-center-right
        { xMin: 0.70, xMax: 0.88, yMin: 0.68, yMax: 0.90 },  // bottom-right
      ];
      // Shuffle zones so different images occupy different regions each load
      for (let i = zoneDefs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [zoneDefs[i], zoneDefs[j]] = [zoneDefs[j], zoneDefs[i]];
      }
      // Pick a random anchor within each zone
      const anchors = zoneDefs.map(z => ({
        x: z.xMin + Math.random() * (z.xMax - z.xMin),
        y: z.yMin + Math.random() * (z.yMax - z.yMin),
      }));

      const gap = Math.max(8, vw * 0.012);
      const margin = vw * 0.01;

      // Use natural aspect ratios (height/width) from preloaded images
      const ars = naturalRatios;

      // Initialize images at their anchors with small jitter
      // (zone range already provides the large-scale variation)
      const imgs = anchors.map((a, i) => {
        const w = widths[i] * vw;
        const h = w * ars[i];
        const jx = (Math.random() - 0.5) * vw * 0.02;
        const jy = (Math.random() - 0.5) * vh * 0.02;
        return {
          x: a.x * vw + jx,
          y: a.y * vh + jy,
          w, h,
          anchorX: a.x * vw,
          anchorY: a.y * vh,
          wFrac: widths[i],
        };
      });

      // Clamp helper
      function clampImg(img) {
        img.x = Math.max(margin, Math.min(vw - img.w - margin, img.x));
        img.y = Math.max(margin, Math.min(vh - img.h - margin, img.y));
      }
      imgs.forEach(clampImg);

      // Iterative relaxation — 120 passes, decreasing anchor pull
      for (let pass = 0; pass < 120; pass++) {
        const t = pass / 120; // 0→1 progress
        for (let i = 0; i < imgs.length; i++) {
          const a = imgs[i];
          let fx = 0, fy = 0;

          // 1. Repel from center exclusion zone
          const acx = a.x + a.w / 2, acy = a.y + a.h / 2;
          const dx_c = acx - cx, dy_c = acy - cy;
          const overX = (exHalfW + a.w / 2 + gap) - Math.abs(dx_c);
          const overY = (exHalfH + a.h / 2 + gap) - Math.abs(dy_c);
          if (overX > 0 && overY > 0) {
            fx += (dx_c >= 0 ? overX : -overX) * 0.7;
            fy += (dy_c >= 0 ? overY : -overY) * 0.7;
          }

          // 2. Repel from other images (strong force)
          for (let j = 0; j < imgs.length; j++) {
            if (i === j) continue;
            const b = imgs[j];
            const dx = (a.x + a.w / 2) - (b.x + b.w / 2);
            const dy = (a.y + a.h / 2) - (b.y + b.h / 2);
            const ox = (a.w / 2 + b.w / 2 + gap) - Math.abs(dx);
            const oy = (a.h / 2 + b.h / 2 + gap) - Math.abs(dy);
            if (ox > 0 && oy > 0) {
              // Push along both axes, proportional to overlap
              const force = 0.65;
              fx += (dx >= 0 ? ox : -ox) * force;
              fy += (dy >= 0 ? oy : -oy) * force;
            }
          }

          // 3. Anchor pull — strong early, weak late (let repulsion win)
          const anchorPull = 0.04 * (1 - t * 0.8);
          fx += (a.anchorX - a.x) * anchorPull;
          fy += (a.anchorY - a.y) * anchorPull;

          a.x += fx;
          a.y += fy;
          clampImg(a);
        }
      }

      // Final safety pass — brute-force fix any remaining overlaps
      for (let safety = 0; safety < 50; safety++) {
        let clean = true;
        for (let i = 0; i < imgs.length; i++) {
          for (let j = i + 1; j < imgs.length; j++) {
            const a = imgs[i], b = imgs[j];
            const ox = (a.w / 2 + b.w / 2 + gap) - Math.abs((a.x + a.w / 2) - (b.x + b.w / 2));
            const oy = (a.h / 2 + b.h / 2 + gap) - Math.abs((a.y + a.h / 2) - (b.y + b.h / 2));
            if (ox > 0 && oy > 0) {
              clean = false;
              const dx = (a.x + a.w / 2) - (b.x + b.w / 2);
              const dy = (a.y + a.h / 2) - (b.y + b.h / 2);
              // Push both apart equally along the axis of least overlap
              if (ox < oy) {
                const push = (ox / 2) + 1;
                a.x += dx >= 0 ? push : -push;
                b.x += dx >= 0 ? -push : push;
              } else {
                const push = (oy / 2) + 1;
                a.y += dy >= 0 ? push : -push;
                b.y += dy >= 0 ? -push : push;
              }
              clampImg(a);
              clampImg(b);
            }
          }
        }
        if (clean) break;
      }

      return imgs.map(img => ({
        left: (img.x / vw * 100).toFixed(2) + '%',
        top: (img.y / vh * 100).toFixed(2) + '%',
        width: (img.wFrac * 100).toFixed(1) + 'vw',
        height: (img.h / vh * 100).toFixed(2) + 'vh',
      }));
    }

    // Preload images to get natural aspect ratios, then layout
    function preloadCollageImages(projects) {
      return Promise.all(projects.slice(0, 9).map(proj => {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => resolve({ proj, ratio: img.naturalHeight / img.naturalWidth });
          img.onerror = () => resolve({ proj, ratio: 1.33 }); // fallback 3:4
          img.src = proj.image + '?auto=format&w=500&q=80';
        });
      }));
    }

    preloadCollageImages(collageImages).then(results => {
      const naturalRatios = results.map(r => r.ratio);
      const organicPositions = generateOrganicPositions(naturalRatios);
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const vcx = vw / 2;
      const vcy = vh / 2;

      results.forEach(({ proj }, i) => {
        const div = document.createElement('div');
        div.className = 'intro-collage-img';
        const pos = organicPositions[i];

        // Final positions — set permanently, never change
        div.style.left   = pos.left;
        div.style.top    = pos.top;
        div.style.width  = pos.width;
        div.style.height = pos.height;

        // Calculate offset to move this image FROM its final position TO viewport center.
        // pos.left/top are %, pos.width is vw units, pos.height is vh units.
        const finalLeft = parseFloat(pos.left)   * vw / 100;
        const finalTop  = parseFloat(pos.top)    * vh / 100;
        const finalW    = parseFloat(pos.width)  * vw / 100;
        const finalH    = parseFloat(pos.height) * vh / 100;
        const offsetX   = vcx - (finalLeft + finalW / 2);
        const offsetY   = vcy - (finalTop  + finalH / 2);

        // Start: centred + hidden, no transition (loader manages appearance)
        div.style.transform  = `translate(${offsetX.toFixed(1)}px, ${offsetY.toFixed(1)}px)`;
        div.style.opacity    = '0';
        div.style.transition = 'none';

        div.innerHTML = `<img src="${proj.image}?auto=format&w=500&q=80" alt="${proj.title}" loading="eager" />`;
        collageContainer.appendChild(div);
      });

      // Trigger intro animation after images are placed
      requestAnimationFrame(() => {
        requestAnimationFrame(() => runIntroLoader());
      });
    });

    // Hover interaction — blur others when hovering a photo
    collageContainer.addEventListener('mouseover', (e) => {
      const img = e.target.closest('.intro-collage-img');
      if (img) {
        collageContainer.classList.add('has-hover');
        collageContainer.querySelectorAll('.intro-collage-img').forEach(el => el.classList.remove('collage-hovered'));
        img.classList.add('collage-hovered');
      }
    });
    collageContainer.addEventListener('mouseout', (e) => {
      const img = e.target.closest('.intro-collage-img');
      if (img && !collageContainer.contains(e.relatedTarget?.closest?.('.intro-collage-img'))) {
        collageContainer.classList.remove('has-hover');
        img.classList.remove('collage-hovered');
      }
    });
    collageContainer.addEventListener('mouseleave', () => {
      collageContainer.classList.remove('has-hover');
      collageContainer.querySelectorAll('.collage-hovered').forEach(el => el.classList.remove('collage-hovered'));
    });

    // Hover on name — blur all photos
    const introName = document.getElementById('intro-name');
    introName.addEventListener('mouseenter', () => {
      collageContainer.classList.add('has-hover');
      // No image gets 'collage-hovered' — so ALL blur
    });
    introName.addEventListener('mouseleave', () => {
      collageContainer.classList.remove('has-hover');
    });

    // Footer
    const _footerCta1 = _introC.footerCta1 || 'Got a project?';
    const _footerCta2 = _introC.footerCta2 || "Let's work together.";
    document.getElementById('site-footer').innerHTML = `
      <div class="footer-cta-section">
        <p class="footer-label">${_footerCta1}</p>
        <h2 class="footer-cta">${_footerCta2}</h2>
        <div class="footer-contact">
          <a href="mailto:${CONFIG.email}" class="footer-email">${CONFIG.email}</a>
          <a href="${CONFIG.instagramUrl}" target="_blank" rel="noopener" class="footer-social">${CONFIG.instagram}</a>
        </div>
      </div>
      ${CONFIG.clientLogos && CONFIG.clientLogos.length ? `
      <div class="footer-clients">
        <p class="footer-clients-label">Selected clients</p>
        <div class="footer-logos">
          ${CONFIG.clientLogos.map(l => `<img src="${l.url}" alt="${l.name}" title="${l.name}" loading="lazy" />`).join('')}
        </div>
      </div>` : ''}
      <div class="footer-bottom">
        <span>${CONFIG.copyright}</span>
        <a href="#" class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false">Back to top &uarr;</a>
      </div>
    `;

    // Info page
    const _infoC      = CONFIG.pageContent?.info || {};
    const _infoLabel  = _infoC.label          || 'About';
    const _infoRole   = _infoC.role           || `Melbourne based. ${CONFIG.tagline}.`;
    const _ig2Label   = _infoC.instagram2Label || '@babyjuanmoretime';
    const _ig2Url     = _infoC.instagram2Url   || 'https://instagram.com/babyjuanmoretime';
    document.getElementById('page-info').innerHTML = `
      <div class="page-title-bar info-title-bar">
        <h2 class="page-title"><a href="#" class="page-title-link" data-page="intro">${CONFIG.name}</a></h2>
      </div>
      <div class="about-inner">
        <div class="about-img-wrap">
          <img class="about-photo" src="${CONFIG.about.photo}" alt="${CONFIG.name}" />
        </div>
        <div class="about-text">
          <p class="about-label">${_infoLabel}</p>
          <h1>${CONFIG.name}</h1>
          <p class="about-role">${_infoRole}</p>
          <p class="about-bio">${CONFIG.about.bio}</p>
          <div class="about-links">
            <a href="mailto:${CONFIG.email}">${CONFIG.email}</a>
            <a href="${CONFIG.instagramUrl}" target="_blank" rel="noopener">${CONFIG.instagram}</a>
            <a href="${_ig2Url}" target="_blank" rel="noopener">${_ig2Label}</a>
          </div>
        </div>
      </div>
    `;

    // ── Intro loader — stacked-centre → spread sequence ─────
    function runIntroLoader() {
      const collageImgs = Array.from(document.querySelectorAll('.intro-collage-img'));

      // ── Timing constants ───────────────────────────────────
      const APPEAR_START   = 80;    // ms before first image pops visible at centre
      const APPEAR_STAGGER = 85;    // base ms between each image appearing
      // Last image appears at: APPEAR_START + 8*APPEAR_STAGGER ≈ 760ms
      // Jitter of ±25ms makes timing feel organic, not mechanical

      const SPREAD_PAUSE   = 220;   // ms to pause with all images visible before spreading
      const SPREAD_STAGGER = 60;    // ms between each image starting its spread
      const SPREAD_DUR     = 1050;  // ms for the spread movement
      // Spread begins at: APPEAR_START + 8*APPEAR_STAGGER + SPREAD_PAUSE ≈ 980ms
      // Last image lands at: ~980 + 8*SPREAD_STAGGER + SPREAD_DUR ≈ 2510ms

      const NAME_DELAY     = 2.65;  // seconds — animation-delay for name
      const TAGLINE_DELAY  = 3.0;   // seconds — animation-delay for tagline

      // Set name/tagline animation delays BEFORE body.loaded triggers CSS animation
      const nameEl    = document.getElementById('intro-name');
      const taglineEl = document.getElementById('intro-tagline');
      nameEl.style.animationDelay    = NAME_DELAY    + 's';
      taglineEl.style.animationDelay = TAGLINE_DELAY + 's';

      // body.loaded starts CSS animations (with delays applied above)
      document.body.classList.add('loaded');

      // ── Phase 1: Pop images visible one by one at centre ─────
      // Each image snaps to full opacity instantly (no fade), staggered with jitter
      collageImgs.forEach((img, i) => {
        const jitter = Math.random() * 50 - 25; // ±25ms organic timing
        const delay  = APPEAR_START + i * APPEAR_STAGGER + jitter;
        setTimeout(() => {
          img.style.transition = 'none';
          img.style.opacity    = '1';
        }, Math.max(20, delay));
      });

      // ── Phase 2: After all visible, spread to final positions ─
      // Shuffle spread order so images don't fly out in arrival order
      const lastAppear = APPEAR_START + (collageImgs.length - 1) * APPEAR_STAGGER + 25; // +25ms jitter max
      const spreadBegins = lastAppear + SPREAD_PAUSE;

      const spreadOrder = collageImgs.map((_, i) => i);
      for (let i = spreadOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [spreadOrder[i], spreadOrder[j]] = [spreadOrder[j], spreadOrder[i]];
      }

      collageImgs.forEach((img, i) => {
        const spreadIndex = spreadOrder.indexOf(i);
        const delay = spreadBegins + spreadIndex * SPREAD_STAGGER;
        setTimeout(() => {
          img.style.transition = [
            `transform ${SPREAD_DUR}ms cubic-bezier(0.16, 1, 0.3, 1)`,
            'filter 0.8s cubic-bezier(0.25, 0.1, 0.25, 1)'
          ].join(', ');
          img.style.transform = 'translate(0, 0)';
        }, delay);
      });

      // ── Phase 3: name + tagline handled by CSS animation ─────
      // (body.loaded rule fires with the animation-delay set above)
    }


    // Fallback: ensure loaded class and visibility after max wait
    setTimeout(() => {
      if (!document.body.classList.contains('loaded')) {
        document.body.classList.add('loaded');
      }
      // Animation fallback: if intro elements are still invisible after
      // body.loaded was added, force them visible (some browsers don't fire CSS animations)
      setTimeout(() => {
        const name = document.getElementById('intro-name');
        if (name && getComputedStyle(name).opacity === '0') {
          document.body.classList.add('no-anim');
        }
      }, 300);
    }, 4000);

    /* ════════════════════════════════════════════════════════
       PAGE MANAGEMENT
       ════════════════════════════════════════════════════════ */
    let currentPage = (typeof CONFIG !== 'undefined' && CONFIG.homePage) ? CONFIG.homePage : 'intro';
    let currentItems = [];
    let lightboxIndex = 0;
    let isTransitioning = false;

    // Page configuration
    const pages = ['intro', 'people', 'things', 'personal', 'personal-v2', 'info', 'archive'];
    const gridPages = {};
    const darkPages = { info: true };

    // Menu preview images — first image of each page gallery.
    window._showPage = showPage;
    function showPage(page) {
      // Clean up carousels / archive when leaving
      if (carouselCleanup)         { carouselCleanup();         carouselCleanup = null; }
      if (personalCleanup)         { personalCleanup();         }
      if (personalV2Cleanup)       { personalV2Cleanup();       personalV2Cleanup = null; }
      if (archiveParallaxCleanup)  { archiveParallaxCleanup();  archiveParallaxCleanup = null; }
      if (archiveZoomedIndex !== null) { closeArchiveZoom(true); }

      // Hide all pages
      pages.forEach(p => {
        const el = document.getElementById(`page-${p}`);
        if (el) el.classList.remove('active');
      });

      // Remove all page-* body classes
      pages.forEach(p => document.body.classList.remove(`page-${p}`));

      // Set new page
      document.body.classList.add(`page-${page}`);
      const target = document.getElementById(`page-${page}`);
      if (target) target.classList.add('active');

      // Footer: show on grid pages (people, things), hide on others
      const footer = document.getElementById('site-footer');
      if (gridPages[page]) {
        footer.classList.add('visible');
      } else {
        footer.classList.remove('visible');
      }

      currentPage = page;
      window.scrollTo({ top: 0 });

      // Render content for each page.
      // tpl = the template key for this page from CONFIG.pageTemplates.
      // When a page has no pageTemplates entry (unmapped/legacy), tpl falls back to
      // the raw page ID — the || tpl === 'X' branches below catch those legacy IDs.
      const tpl = (typeof CONFIG !== 'undefined' && CONFIG.pageTemplates?.[page]) || page;

      if      (tpl === 'carousel'            || tpl === 'people')      { renderCarousel(page); }
      else if (tpl === 'grid'                || tpl === 'things')      { renderMasonryGrid(page); }
      else if (tpl === 'fullscreen-carousel' || tpl === 'personal-v2') { renderPersonalCarousel(); }
      else if (tpl === 'personal')                                      { renderPersonalGrid(); }
      else if (tpl === 'archive')                                       { renderArchiveGallery(); archiveParallaxCleanup = initArchiveParallax(); }
      // intro / info / custom — static HTML, no dynamic render step needed.
      // archive-standalone / filmstrip — external .html files, never reach showPage().
    }

    /* ════════════════════════════════════════════════════════
       WIPE TRANSITION
       ════════════════════════════════════════════════════════ */
    function navigateTo(targetPage) {
      if (isTransitioning) return;
      if (currentPage === targetPage) return;

      // If the target is a standalone page (external HTML), navigate directly.
      const _allPagesNav = (typeof CONFIG !== 'undefined' && CONFIG.allPages) || [];
      const _targetMeta  = _allPagesNav.find(p => p.id === targetPage);
      if (_targetMeta && ['archive-standalone', 'filmstrip'].includes(_targetMeta.template)) {
        window.location.href = '/' + (_targetMeta.slug || targetPage);
        return;
      }

      isTransitioning = true;

      // Close menu first if open
      closeMenu();

      const isDark = darkPages[targetPage];

      // Create wipe overlay
      const overlay = document.createElement('div');
      overlay.className = 'wipe-overlay';
      if (isDark) overlay.classList.add('wipe-dark');
      document.body.appendChild(overlay);

      // Phase 1: slide up to cover
      requestAnimationFrame(() => {
        overlay.classList.add('wipe-in');

        let inDone = false;
        function onInDone() {
          if (inDone) return;
          inDone = true;
          overlay.removeEventListener('animationend', onInDone);

          // Switch content while covered
          showPage(targetPage);

          // Update URL so reload returns to this page.
          // Use replaceState (no new history entry) — back button exits the site.
          // All SPA pages get a clean /slug URL (no hash, no .html extension).
          {
            const homeId = (typeof CONFIG !== 'undefined' && CONFIG.homePage) ? CONFIG.homePage : 'intro';
            if (targetPage === homeId) {
              history.replaceState(null, '', '/');
            } else {
              const _pg   = (typeof CONFIG !== 'undefined' && CONFIG.allPages || []).find(p => p.id === targetPage);
              const _slug = (_pg && _pg.slug) ? _pg.slug : targetPage;
              history.replaceState(null, '', '/' + _slug);
            }
          }

          // Phase 2: slide away
          requestAnimationFrame(() => {
            overlay.classList.remove('wipe-in');
            overlay.classList.add('wipe-out');

            let outDone = false;
            function onOutDone() {
              if (outDone) return;
              outDone = true;
              overlay.removeEventListener('animationend', onOutDone);
              overlay.remove();
              isTransitioning = false;
            }
            overlay.addEventListener('animationend', onOutDone);
            // Fallback if animationend doesn't fire
            setTimeout(onOutDone, 650);
          });
        }
        overlay.addEventListener('animationend', onInDone);
        // Fallback if animationend doesn't fire
        setTimeout(onInDone, 650);
      });
    }

    /* ════════════════════════════════════════════════════════
       CAROUSEL (People)
       ════════════════════════════════════════════════════════ */
    let carouselIdx = 0;
    let carouselCleanup = null;
    let archiveParallaxCleanup = null;
    let archiveZoomedIndex = null;
    let archiveZoomOverlay  = null;
    let archiveZoomClone    = null;
    let archiveOpenRafId    = null; // cancellable — prevents open rAF overriding a fast close

    function renderCarousel(pageId) {
      const pid = pageId || 'people';
      // Find track inside section#page-{pid}, fall back to legacy #carousel-track
      const section = document.getElementById(`page-${pid}`);
      const track = (section && section.querySelector('.carousel-track')) || document.getElementById('carousel-track');
      if (!track) return;

      // Clean up previous
      if (carouselCleanup) { carouselCleanup(); carouselCleanup = null; }
      track.innerHTML = '';
      carouselIdx = 0;

      const items = CONFIG.pageGalleries?.[pid] || CONFIG.pageGalleries?.people || [];
      currentItems = items;

      items.forEach((proj, idx) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        if (idx === 0) slide.classList.add('active');
        slide.innerHTML = `
          <div class="portfolio-item-img-wrap">
            <img src="${proj.image}?auto=format&w=1200&q=90"
                 alt="${proj.title}" loading="${idx < 3 ? 'eager' : 'lazy'}" />
          </div>
        `;
        slide.dataset.idx = idx;
        track.appendChild(slide);
      });

      function updateCarousel() {
        const slides = track.querySelectorAll('.carousel-slide');
        if (!slides.length) return;
        const vw = window.innerWidth / 100;
        const slideEffective = 39 * vw;
        const marginL = -8 * vw;
        const slideW = 55 * vw;
        const slideCenter = marginL + (slideW / 2) + (carouselIdx * slideEffective);
        const containerW = track.parentElement.clientWidth || window.innerWidth;
        const offset = (containerW / 2) - slideCenter;
        track.style.transform = `translateX(${offset}px)`;
        slides.forEach((s, i) => s.classList.toggle('active', i === carouselIdx));
      }

      function goToSlide(idx) {
        carouselIdx = Math.max(0, Math.min(idx, items.length - 1));
        updateCarousel();
      }

      // Resize
      window.addEventListener('resize', updateCarousel);

      // Click: active opens lightbox, others navigate
      track.querySelectorAll('.carousel-slide').forEach((slide, i) => {
        slide.addEventListener('click', () => {
          if (i === carouselIdx) openLightbox(i, items);
          else goToSlide(i);
        });
      });

      // Keyboard
      const keyHandler = (e) => {
        if (document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'ArrowRight') goToSlide(carouselIdx + 1);
        if (e.key === 'ArrowLeft') goToSlide(carouselIdx - 1);
      };
      document.addEventListener('keydown', keyHandler);

      // Wheel (debounced)
      let wheelLock = false;
      const wheelHandler = (e) => {
        if (document.getElementById('lightbox').classList.contains('open')) return;
        if (wheelLock) { e.preventDefault(); return; }
        if (Math.abs(e.deltaY) > 10) {
          e.preventDefault();
          wheelLock = true;
          goToSlide(carouselIdx + (e.deltaY > 0 ? 1 : -1));
          setTimeout(() => { wheelLock = false; }, 700);
        }
      };
      document.addEventListener('wheel', wheelHandler, { passive: false });

      // Touch swipe (mobile) — horizontal swipe advances slides
      const carouselEl = track.parentElement;
      let touchStartX = 0, touchStartY = 0, touchAxisLocked = false;
      const onTouchStart = (e) => {
        touchStartX    = e.touches[0].clientX;
        touchStartY    = e.touches[0].clientY;
        touchAxisLocked = false;
      };
      const onTouchMove = (e) => {
        if (touchAxisLocked) return;
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);
        // If vertical gesture dominates, lock out horizontal handling
        if (dy > dx + 6) { touchAxisLocked = true; }
      };
      const onTouchEnd = (e) => {
        if (touchAxisLocked) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 40) {
          if (dx < 0) goToSlide(carouselIdx + 1);
          else        goToSlide(carouselIdx - 1);
        }
      };
      carouselEl.addEventListener('touchstart', onTouchStart, { passive: true });
      carouselEl.addEventListener('touchmove',  onTouchMove,  { passive: true });
      carouselEl.addEventListener('touchend',   onTouchEnd,   { passive: true });

      // Lock body scroll
      document.body.style.overflow = 'hidden';
      window.scrollTo({ top: 0 });

      // Cleanup
      carouselCleanup = () => {
        document.removeEventListener('keydown', keyHandler);
        document.removeEventListener('wheel', wheelHandler);
        window.removeEventListener('resize', updateCarousel);
        carouselEl.removeEventListener('touchstart', onTouchStart);
        carouselEl.removeEventListener('touchmove',  onTouchMove);
        carouselEl.removeEventListener('touchend',   onTouchEnd);
        document.body.style.overflow = '';
      };

      updateCarousel();
      setTimeout(() => updateCarousel(), 50);
      reattachCursorEvents();
    }

    /* ════════════════════════════════════════════════════════
       MASONRY GRID (Things)
       ════════════════════════════════════════════════════════ */
    function renderMasonryGrid(category) {
      const gridId = `grid-${category}`;
      const grid = document.getElementById(gridId);
      if (!grid) return;

      grid.innerHTML = '';
      const items = CONFIG.pageGalleries?.[category] || CONFIG.projects.filter(p => p.categories.includes(category));
      currentItems = items;

      const colCount = window.innerWidth <= 600 ? 1 : window.innerWidth <= 768 ? 2 : 3;
      const columns = [];
      for (let i = 0; i < colCount; i++) {
        const col = document.createElement('div');
        col.className = 'portfolio-column';
        columns.push(col);
        grid.appendChild(col);
      }

      items.forEach((proj, idx) => {
        const div = document.createElement('div');
        div.className = 'portfolio-item';
        div.setAttribute('tabindex', '0');
        div.setAttribute('role', 'button');
        div.setAttribute('aria-label', proj.title);
        div.innerHTML = `
          <div class="portfolio-item-img-wrap">
            <img src="${proj.image}?auto=format&w=700&q=85"
                 alt="${proj.title}" loading="${idx < 6 ? 'eager' : 'lazy'}" />
          </div>
        `;
        div.addEventListener('click', () => openLightbox(idx, items));
        div.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') openLightbox(idx, items);
        });

        // Round-robin: (idx + 1) % 3 puts extras in middle column
        const colIdx = colCount === 3 ? ((idx + 1) % colCount) : (idx % colCount);
        columns[colIdx].appendChild(div);
      });

      requestAnimationFrame(() => animateItems(grid));
      reattachCursorEvents();
    }

    /* ════════════════════════════════════════════════════════
       PERSONAL — CENTERED SCALE CAROUSEL  (siemprericc-style)
       Center image large, sides scaled down, counter at bottom.
       ════════════════════════════════════════════════════════ */
    let personalCleanup = null;

    function renderPersonalGrid() {
      const container  = document.getElementById('personal-carousel');
      const counterEl  = document.getElementById('personal-counter');
      if (!container) return;

      // Teardown previous instance
      if (personalCleanup) { personalCleanup(); personalCleanup = null; }
      container.innerHTML = '';
      if (counterEl) counterEl.textContent = '';

      const items = CONFIG.pageGalleries?.['personal'] || CONFIG.pageGalleries?.['personal-v2'] || CONFIG.projects.filter(p => p.categories.includes('personal'));
      const total = items.length;
      currentItems = items;
      if (!total) return;

      let activeIdx  = 0;
      let dragStartX = 0;
      let dragOffset = 0;
      let isDragging = false;
      let didDrag    = false;

      // ── Visual constants ─────────────────────────────────────
      const ACTIVE_SCALE      = 1.22;
      const INACTIVE_SCALE    = 0.70;
      const IMG_GAP           = 72;   // px gap between scaled image edges
      const TRANSITION_MS     = 680;
      const EASE              = 'cubic-bezier(0.25, 0.1, 0.25, 1)';

      // Base image height — much taller than previous (was 420px max)
      const imgH = () => Math.min(window.innerHeight * 0.62, 620);

      // ── Build slides ─────────────────────────────────────────
      const slides = items.map((proj, idx) => {
        const slide = document.createElement('div');
        slide.className = 'personal-slide';
        const img = document.createElement('img');
        img.src       = (proj.url || proj.image) + '?auto=format&w=1400&q=88';
        img.alt       = proj.title || '';
        img.loading   = idx < 6 ? 'eager' : 'lazy';
        img.draggable = false;
        img.style.cssText = `height:${imgH()}px;width:auto;max-width:72vw;object-fit:contain;display:block;pointer-events:none;`;
        slide.appendChild(img);

        // Click: center image → lightbox; side image → navigate
        slide.addEventListener('click', () => {
          if (didDrag) { didDrag = false; return; }
          if (idx === activeIdx) openLightbox(idx, items);
          else goTo(idx);
        });

        container.appendChild(slide);
        return slide;
      });

      // ── Layout engine ─────────────────────────────────────────
      // Positions all slides around the active one using scale + translate3d.
      function layout(animate) {
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        const cx = cw / 2;
        const cy = ch / 2;

        const data = slides.map((slide, i) => {
          const img    = slide.querySelector('img');
          const nw     = img ? img.clientWidth  || img.naturalWidth  * (imgH() / (img.naturalHeight || imgH())) : 200;
          const nh     = img ? img.clientHeight || imgH() : imgH();
          const scale  = i === activeIdx ? ACTIVE_SCALE : INACTIVE_SCALE;
          return { nw, nh, scale, sw: nw * scale };
        });

        // Walk outward from active to build centerX for each slide
        const cx_arr = new Array(slides.length).fill(0);
        cx_arr[activeIdx] = cx + dragOffset;

        for (let i = activeIdx + 1; i < slides.length; i++) {
          cx_arr[i] = cx_arr[i - 1] + data[i - 1].sw / 2 + IMG_GAP + data[i].sw / 2;
        }
        for (let i = activeIdx - 1; i >= 0; i--) {
          cx_arr[i] = cx_arr[i + 1] - data[i + 1].sw / 2 - IMG_GAP - data[i].sw / 2;
        }

        slides.forEach((slide, i) => {
          const { nw, nh, scale } = data[i];
          const x = cx_arr[i] - nw / 2;
          const y = cy - nh / 2;
          const z = i === activeIdx ? 10 : 1;
          const dist  = Math.abs(i - activeIdx);
          const opac  = dist > 5 ? 0 : 1;

          slide.style.transition = animate
            ? `transform ${TRANSITION_MS}ms ${EASE}, opacity ${TRANSITION_MS}ms ${EASE}`
            : 'none';
          slide.style.transform  = `translate3d(${x}px,${y}px,0) scale(${scale})`;
          slide.style.zIndex     = z;
          slide.style.opacity    = opac;
        });
      }

      // ── Counter ───────────────────────────────────────────────
      function updateCounter() {
        if (counterEl) counterEl.textContent = `${activeIdx + 1} / ${total}`;
      }

      // ── Navigation ────────────────────────────────────────────
      function goTo(idx, animated = true) {
        activeIdx  = Math.max(0, Math.min(idx, total - 1));
        dragOffset = 0;
        layout(animated);
        updateCounter();
      }
      const goNext = () => { if (activeIdx < total - 1) goTo(activeIdx + 1); };
      const goPrev = () => { if (activeIdx > 0)         goTo(activeIdx - 1); };

      // ── Wheel — accumulator, one step per gesture ─────────────
      let wheelAccum = 0, wheelTimer = null, lastWheelNav = 0;
      const WHEEL_THRESHOLD = 50, WHEEL_COOLDOWN = 320, WHEEL_RESET = 120;
      function onWheel(e) {
        e.preventDefault();
        const now = Date.now();
        if (now - lastWheelNav < WHEEL_COOLDOWN) return;
        const delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
        wheelAccum += delta;
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(() => { wheelAccum = 0; }, WHEEL_RESET);
        if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
          wheelAccum > 0 ? goNext() : goPrev();
          lastWheelNav = now;
          wheelAccum = 0;
          clearTimeout(wheelTimer);
        }
      }

      // ── Mouse drag ────────────────────────────────────────────
      function onMouseDown(e) {
        isDragging = true; didDrag = false;
        dragStartX = e.clientX; dragOffset = 0;
        slides.forEach(s => { s.style.transition = 'none'; });
        container.style.cursor = 'grabbing';
      }
      function onMouseMove(e) {
        if (!isDragging) return;
        dragOffset = e.clientX - dragStartX;
        if (Math.abs(dragOffset) > 5) didDrag = true;
        layout(false);
      }
      function onMouseUp() {
        if (!isDragging) return;
        isDragging = false;
        container.style.cursor = '';
        const thresh = window.innerWidth * 0.10;
        if      (dragOffset >  thresh) goPrev();
        else if (dragOffset < -thresh) goNext();
        else { dragOffset = 0; layout(true); }
      }

      // ── Touch drag ────────────────────────────────────────────
      function onTouchStart(e) {
        isDragging = true; didDrag = false;
        dragStartX = e.touches[0].clientX; dragOffset = 0;
        slides.forEach(s => { s.style.transition = 'none'; });
      }
      function onTouchMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        dragOffset = e.touches[0].clientX - dragStartX;
        if (Math.abs(dragOffset) > 5) didDrag = true;
        layout(false);
      }
      function onTouchEnd() {
        if (!isDragging) return;
        isDragging = false;
        const thresh = window.innerWidth * 0.10;
        if      (dragOffset >  thresh) goPrev();
        else if (dragOffset < -thresh) goNext();
        else { dragOffset = 0; layout(true); }
      }

      // ── Keyboard ──────────────────────────────────────────────
      function onKeyDown(e) {
        if (currentPage !== 'personal') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goPrev(); }
      }

      // ── Resize ────────────────────────────────────────────────
      function onResize() {
        slides.forEach(s => {
          const img = s.querySelector('img');
          if (img) img.style.height = imgH() + 'px';
        });
        layout(false);
      }

      // Attach events
      container.addEventListener('wheel',      onWheel,      { passive: false });
      container.addEventListener('mousedown',  onMouseDown);
      window.addEventListener   ('mousemove',  onMouseMove);
      window.addEventListener   ('mouseup',    onMouseUp);
      container.addEventListener('touchstart', onTouchStart, { passive: true });
      container.addEventListener('touchmove',  onTouchMove,  { passive: false });
      container.addEventListener('touchend',   onTouchEnd);
      window.addEventListener   ('keydown',    onKeyDown);
      window.addEventListener   ('resize',     onResize);

      // ── Cursor ────────────────────────────────────────────────
      slides.forEach(slide => {
        slide.addEventListener('mouseenter', () => { setCursorLabel('View'); cursor.classList.add('cursor--active'); });
        slide.addEventListener('mouseleave', () => { cursor.classList.remove('cursor--active'); });
      });

      document.body.style.overflow = 'hidden';

      // Initial layout — no animation, then re-layout once images load
      goTo(0, false);
      let loadCount = 0;
      slides.forEach((slide) => {
        const img = slide.querySelector('img');
        if (!img) return;
        const onLoad = () => { loadCount++; if (loadCount <= 6) layout(loadCount === 1); };
        if (img.complete) onLoad();
        else img.addEventListener('load', onLoad, { once: true });
      });

      // ── Cleanup ───────────────────────────────────────────────
      personalCleanup = () => {
        container.removeEventListener('wheel',      onWheel);
        container.removeEventListener('mousedown',  onMouseDown);
        window.removeEventListener   ('mousemove',  onMouseMove);
        window.removeEventListener   ('mouseup',    onMouseUp);
        container.removeEventListener('touchstart', onTouchStart);
        container.removeEventListener('touchmove',  onTouchMove);
        container.removeEventListener('touchend',   onTouchEnd);
        window.removeEventListener   ('keydown',    onKeyDown);
        window.removeEventListener   ('resize',     onResize);
        document.body.style.overflow = '';
        container.innerHTML = '';
        if (counterEl) counterEl.textContent = '';
        personalCleanup = null;
      };
    }

    /* ── Smooth scroll with easeInOutCubic ──────────────── */
    function smoothScrollTo(el, targetLeft, duration) {
      const start = el.scrollLeft;
      const distance = Math.max(0, Math.min(targetLeft, el.scrollWidth - el.clientWidth)) - start;
      const startTime = performance.now();
      function ease(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }
      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        el.scrollLeft = start + distance * ease(progress);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    /* ── Drag-to-scroll for horizontal galleries ──────── */
    function initDragScroll(el) {
      if (el._dragCleanup) el._dragCleanup();

      let isDown = false, startX, scrollLeft;
      el._didDrag = false;

      const onMouseDown = e => {
        isDown = true;
        el._didDrag = false;
        startX = e.pageX - el.offsetLeft;
        scrollLeft = el.scrollLeft;
      };
      const onMouseLeave = () => { isDown = false; };
      const onMouseUp = () => { isDown = false; };
      const onMouseMove = e => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - el.offsetLeft;
        const walk = (x - startX) * 1.5;
        if (Math.abs(walk) > 5) el._didDrag = true;
        el.scrollLeft = scrollLeft - walk;
      };
      // Smooth wheel scroll
      let wheelTarget = null;
      let wheelRAF = null;
      const onWheel = e => {
        if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
          e.preventDefault();
          if (wheelTarget === null) wheelTarget = el.scrollLeft;
          wheelTarget += e.deltaY * 1.2;
          wheelTarget = Math.max(0, Math.min(wheelTarget, el.scrollWidth - el.clientWidth));
          if (!wheelRAF) {
            const lerp = () => {
              const diff = wheelTarget - el.scrollLeft;
              if (Math.abs(diff) < 0.5) {
                el.scrollLeft = wheelTarget;
                wheelRAF = null;
                wheelTarget = null;
                return;
              }
              el.scrollLeft += diff * 0.08;
              wheelRAF = requestAnimationFrame(lerp);
            };
            wheelRAF = requestAnimationFrame(lerp);
          }
        }
      };

      el.addEventListener('mousedown', onMouseDown);
      el.addEventListener('mouseleave', onMouseLeave);
      el.addEventListener('mouseup', onMouseUp);
      el.addEventListener('mousemove', onMouseMove);
      el.addEventListener('wheel', onWheel, { passive: false });

      el._dragCleanup = () => {
        el.removeEventListener('mousedown', onMouseDown);
        el.removeEventListener('mouseleave', onMouseLeave);
        el.removeEventListener('mouseup', onMouseUp);
        el.removeEventListener('mousemove', onMouseMove);
        el.removeEventListener('wheel', onWheel);
        el._dragCleanup = null;
      };
    }

    /* ════════════════════════════════════════════════════════
       PERSONAL V2 — TRANSFORM-BASED CAROUSEL
       ════════════════════════════════════════════════════════ */
    let personalV2Cleanup = null;

    function renderPersonalCarousel() {
      const container = document.getElementById('personal-v2-carousel');
      const counterEl = document.getElementById('personal-v2-counter');
      if (!container) return;

      // Clean up previous instance
      if (personalV2Cleanup) { personalV2Cleanup(); personalV2Cleanup = null; }
      container.innerHTML = '';

      // Force critical styles (preview browser may cache CSS)
      container.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;overflow:visible;cursor:grab;user-select:none;-webkit-user-select:none;';

      const items = CONFIG.pageGalleries?.['personal-v2'] || CONFIG.projects.filter(p => p.categories.includes('personal'));
      const total = items.length;
      if (!total) return;

      let activeIndex = 0;
      let isAnimating = false;
      let dragStartX = 0;
      let dragOffset = 0;
      let isDragging = false;
      let didDrag = false;

      // Sizing — spacing between slide centers
      const getSpacing = () => {
        const vw = window.innerWidth;
        if (vw < 600) return vw * 0.65;
        if (vw < 900) return vw * 0.50;
        return Math.min(vw * 0.42, 600);
      };
      const ACTIVE_SCALE = 1.25;
      const INACTIVE_SCALE = 0.78;
      const TRANSITION_DURATION = 900; // ms

      // Create DOM items
      const imgHeight = Math.max(180, Math.min(window.innerHeight * 0.34, 420));
      const slides = items.map((proj, idx) => {
        const slide = document.createElement('div');
        slide.className = 'pv2-slide';
        slide.style.cssText = 'position:absolute;top:0;left:0;transform-origin:center center;will-change:transform,opacity;';
        const img = document.createElement('img');
        img.src = proj.image + '?auto=format&w=1200&q=85';
        img.alt = proj.title;
        img.loading = idx < 5 ? 'eager' : 'lazy';
        img.draggable = false;
        // On mobile, cap width so that after ACTIVE_SCALE(1.25) visual = ~75vw with breathing room
        const _maxImgW = window.innerWidth < 600 ? '60vw' : '80vw';
        img.style.cssText = `height:${imgHeight}px;width:auto;max-width:${_maxImgW};object-fit:contain;display:block;pointer-events:none;`;
        slide.appendChild(img);
        slide.addEventListener('click', () => {
          if (didDrag) { didDrag = false; return; }
          if (idx === activeIndex) {
            openLightbox(idx, items);
          } else {
            goTo(idx);
          }
        });
        container.appendChild(slide);
        return slide;
      });

      // Gap between edges of adjacent images (px)
      const IMG_GAP = 96;

      // Position all slides based on active index + optional drag offset
      function layoutSlides(animate) {
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        const cx = cw / 2;
        const cy = ch / 2;

        // Pre-compute each slide's natural width (unscaled) and its scale
        const slideData = slides.map((slide, i) => {
          const img = slide.querySelector('img');
          const naturalW = img ? img.clientWidth : 200;
          const naturalH = img ? img.clientHeight : 200;
          const scale = i === activeIndex ? ACTIVE_SCALE : INACTIVE_SCALE;
          return { naturalW, naturalH, scale, scaledW: naturalW * scale };
        });

        // Compute X center for each slide by walking outward from active
        const centerXs = new Array(slides.length).fill(0);
        centerXs[activeIndex] = cx;

        // Walk right from active
        for (let i = activeIndex + 1; i < slides.length; i++) {
          const prevHalfW = slideData[i - 1].scaledW / 2;
          const currHalfW = slideData[i].scaledW / 2;
          centerXs[i] = centerXs[i - 1] + prevHalfW + IMG_GAP + currHalfW;
        }
        // Walk left from active
        for (let i = activeIndex - 1; i >= 0; i--) {
          const nextHalfW = slideData[i + 1].scaledW / 2;
          const currHalfW = slideData[i].scaledW / 2;
          centerXs[i] = centerXs[i + 1] - nextHalfW - IMG_GAP - currHalfW;
        }

        slides.forEach((slide, i) => {
          const rel = i - activeIndex;
          const { naturalW, naturalH, scale } = slideData[i];
          const z = i === activeIndex ? 10 : 1;
          const opacity = Math.abs(rel) > 6 ? 0 : 1;

          // Position so the slide's visual center lands at centerXs[i]
          const x = centerXs[i] + dragOffset - naturalW / 2;
          const y = cy - naturalH / 2;

          if (animate) {
            slide.style.transition = `transform ${TRANSITION_DURATION}ms cubic-bezier(0.16, 1, 0.3, 1)`;
          } else {
            slide.style.transition = 'none';
          }

          slide.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
          slide.style.zIndex = z;
          slide.style.opacity = opacity;
        });
      }

      // Update caption & counter
      function updateCaption() {
        const proj = items[activeIndex];
        counterEl.textContent = `${activeIndex + 1} / ${total}`;
      }

      // Navigate to a specific index — never blocks input
      function goTo(idx, animated = true) {
        const newIdx = Math.max(0, Math.min(idx, total - 1));
        activeIndex = newIdx;
        dragOffset = 0;
        layoutSlides(animated);
        updateCaption();
      }

      function goNext() { if (activeIndex < total - 1) goTo(activeIndex + 1); }
      function goPrev() { if (activeIndex > 0) goTo(activeIndex - 1); }

      // ── Wheel navigation — accumulator-based, one image per gesture ──
      let wheelAccum = 0;
      let wheelTimer = null;
      let lastWheelNav = 0;
      const WHEEL_THRESHOLD = 50;   // accumulated delta needed to trigger
      const WHEEL_COOLDOWN = 320;   // ms cooldown after each navigation
      const WHEEL_RESET_DELAY = 120; // ms of silence before resetting accumulator

      function onWheel(e) {
        e.preventDefault();
        const now = Date.now();

        // Cooldown — absorb all wheel events shortly after a navigation
        if (now - lastWheelNav < WHEEL_COOLDOWN) return;

        // Accumulate delta (use the dominant axis)
        const delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
        wheelAccum += delta;

        // Reset accumulator after a pause (end of gesture)
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(() => { wheelAccum = 0; }, WHEEL_RESET_DELAY);

        // Trigger navigation once threshold is reached
        if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
          if (wheelAccum > 0) goNext();
          else goPrev();
          lastWheelNav = now;
          wheelAccum = 0;
          clearTimeout(wheelTimer);
        }
      }

      // ── Mouse drag ──
      function onMouseDown(e) {
        isDragging = true;
        didDrag = false;
        dragStartX = e.clientX;
        dragOffset = 0;
        // Cancel any running CSS transitions so drag feels immediate
        slides.forEach(s => { s.style.transition = 'none'; });
        container.style.cursor = 'grabbing';
      }
      function onMouseMove(e) {
        if (!isDragging) return;
        dragOffset = e.clientX - dragStartX;
        if (Math.abs(dragOffset) > 5) didDrag = true;
        layoutSlides(false);
      }
      function onMouseUp() {
        if (!isDragging) return;
        isDragging = false;
        container.style.cursor = '';
        const threshold = getSpacing() * 0.18;
        if (dragOffset > threshold) goPrev();
        else if (dragOffset < -threshold) goNext();
        else { dragOffset = 0; layoutSlides(true); }
      }

      // ── Touch drag ──
      function onTouchStart(e) {
        isDragging = true;
        didDrag = false;
        dragStartX = e.touches[0].clientX;
        dragOffset = 0;
        slides.forEach(s => { s.style.transition = 'none'; });
      }
      function onTouchMove(e) {
        if (!isDragging) return;
        // Prevent browser from scrolling the page — this carousel is full-screen and must not scroll
        e.preventDefault();
        dragOffset = e.touches[0].clientX - dragStartX;
        if (Math.abs(dragOffset) > 5) didDrag = true;
        layoutSlides(false);
      }
      function onTouchEnd() {
        if (!isDragging) return;
        isDragging = false;
        const threshold = getSpacing() * 0.18;
        if (dragOffset > threshold) goPrev();
        else if (dragOffset < -threshold) goNext();
        else { dragOffset = 0; layoutSlides(true); }
      }

      // ── Keyboard ──
      function onKeyDown(e) {
        if (currentPage !== 'personal-v2') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goPrev(); }
      }

      // ── Resize ──
      function onResize() { layoutSlides(false); }

      // Attach events
      container.addEventListener('wheel', onWheel, { passive: false });
      container.addEventListener('mousedown', onMouseDown);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
      container.addEventListener('touchstart', onTouchStart, { passive: true });
      container.addEventListener('touchmove', onTouchMove, { passive: false }); // non-passive: allows preventDefault to block page scroll
      container.addEventListener('touchend', onTouchEnd);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('resize', onResize);

      // Initial layout (no animation), then animate in after images start loading
      goTo(0, false);

      // Re-layout once first few images load so dimensions are correct
      let loadCount = 0;
      slides.forEach((slide, i) => {
        const img = slide.querySelector('img');
        if (img) {
          const onLoad = () => {
            loadCount++;
            if (loadCount <= 5) layoutSlides(loadCount === 1);
          };
          if (img.complete) onLoad();
          else img.addEventListener('load', onLoad, { once: true });
        }
      });

      // Cursor events
      slides.forEach(slide => {
        slide.addEventListener('mouseenter', () => {
          setCursorLabel('View');
          cursor.classList.add('cursor--active');
        });
        slide.addEventListener('mouseleave', () => {
          cursor.classList.remove('cursor--active');
        });
      });

      // Lock body scroll for the duration of this page (prevents iOS rubber-band and layout shift)
      document.body.style.overflow = 'hidden';

      // Cleanup
      personalV2Cleanup = () => {
        container.removeEventListener('wheel', onWheel);
        container.removeEventListener('mousedown', onMouseDown);
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
        container.removeEventListener('touchstart', onTouchStart);
        container.removeEventListener('touchmove', onTouchMove);
        container.removeEventListener('touchend', onTouchEnd);
        window.removeEventListener('keydown', onKeyDown);
        window.removeEventListener('resize', onResize);
        document.body.style.overflow = '';
        container.innerHTML = '';
        counterEl.textContent = '';
      };
    }

    /* ── Scroll reveal animation ─────────────────────── */
    let scrollObs = null;
    function animateItems(container) {
      if (scrollObs) scrollObs.disconnect();
      const items = container.querySelectorAll('.portfolio-item');
      items.forEach(el => { el.style.transitionDelay = '0ms'; });

      scrollObs = new IntersectionObserver(entries => {
        const newEntries = entries.filter(e => e.isIntersecting);
        newEntries.forEach((entry, i) => {
          entry.target.style.transitionDelay = `${i * 100}ms`;
          requestAnimationFrame(() => {
            entry.target.classList.add('visible');
          });
          scrollObs.unobserve(entry.target);
        });
      }, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });
      items.forEach(el => scrollObs.observe(el));
    }

    /* ════════════════════════════════════════════════════════
       ARCHIVE — Parallax image gallery
       Access via: yoursite.com/#archive
       ════════════════════════════════════════════════════════ */

    // Parallax speeds per column (6 columns, symmetrical)
    // Negative → column rises faster; positive → column lags
    const ARCHIVE_SPEEDS = [-0.03, 0.012, 0.042, -0.042, -0.012, 0.03];

    function renderArchiveGallery() {
      const grid = document.getElementById('archive-grid');
      if (!grid || grid.hasChildNodes()) return;

      // Build image list from archive gallery, cycle to fill 54 slots
      const archiveSource = CONFIG.pageGalleries?.archive || CONFIG.projects;
      const base = archiveSource.map(p => ({ url: p.url || p.image, title: p.alt || p.title || '' }));
      const images = [];
      for (let i = 0; images.length < 54; i++) {
        images.push(base[i % base.length]);
      }

      images.forEach((item, i) => {
        const col  = i % 6;
        const cell = document.createElement('div');
        cell.className    = 'archive-cell';
        cell.dataset.speed = ARCHIVE_SPEEDS[col];

        const wrap = document.createElement('div');
        wrap.className = 'archive-item';

        const img = document.createElement('img');
        img.src     = item.url + '?auto=format&w=700&q=80';
        img.alt     = item.title || '';
        img.loading = i < 15 ? 'eager' : 'lazy';

        wrap.appendChild(img);
        cell.appendChild(wrap);
        grid.appendChild(cell);

        cell.addEventListener('click', () => openArchiveZoom(i));

        if (!isTouch) {
          cell.addEventListener('mouseenter', () => {
            setCursorLabel('View');
            cursor.classList.add('cursor--active');
          });
          cell.addEventListener('mouseleave', () => {
            cursor.classList.remove('cursor--active');
          });
        }
      });

      updateArchiveParallax(0);
    }

    function updateArchiveParallax(drift) {
      const cells = document.querySelectorAll('#archive-grid .archive-cell');
      cells.forEach(cell => {
        const speed = parseFloat(cell.dataset.speed);
        // drift = velocity-based offset (px/frame), scaled per column speed
        cell.style.transform = `translate3d(0, ${(drift * speed * 7).toFixed(2)}px, 0)`;
      });
    }

    function initArchiveParallax() {
      let lastScrollY  = window.scrollY;
      let pendingDelta = 0;   // raw scroll delta accumulated since last rAF tick
      let smoothedVel  = 0;   // stage 1: absorbs raw delta quickly — no binary switch
      let driftOffset  = 0;   // stage 2: follows smoothedVel gently — drives display
      let rafId        = null;

      function onScroll() {
        const y      = window.scrollY;
        pendingDelta += y - lastScrollY;
        lastScrollY   = y;
      }

      function tick() {
        if (archiveZoomedIndex === null) {
          const raw    = Math.max(-50, Math.min(50, pendingDelta));
          pendingDelta = 0;

          // Two-stage continuous smoothing — no binary rate switch, no micro-jumps.
          // Stage 1: smoothedVel tracks raw delta at a fast but smooth rate.
          // Stage 2: driftOffset follows smoothedVel at a gentler rate.
          // When scroll stops, both decay to 0 continuously at their own pace.
          smoothedVel  += (raw         - smoothedVel)  * 0.22;
          driftOffset  += (smoothedVel - driftOffset)  * 0.10;

          if (Math.abs(driftOffset) > 0.3) {
            updateArchiveParallax(driftOffset);
          } else {
            smoothedVel = 0;
            driftOffset = 0;
            updateArchiveParallax(0);
          }
        }
        rafId = requestAnimationFrame(tick);
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      rafId = requestAnimationFrame(tick);

      return () => {
        window.removeEventListener('scroll', onScroll);
        cancelAnimationFrame(rafId);
      };
    }

    // ── Archive zoom — floating clone FLIP, full-resolution ─

    function openArchiveZoom(index) {
      if (archiveZoomedIndex !== null) return;

      const cells = Array.from(document.querySelectorAll('#archive-grid .archive-cell'));
      const cell  = cells[index];
      if (!cell) return;

      archiveZoomedIndex = index;

      const srcImg = cell.querySelector('img');
      const vw     = window.innerWidth;
      const vh     = window.innerHeight;

      // Natural image dimensions (fall back to something sensible)
      const natW  = srcImg.naturalWidth  || 800;
      const natH  = srcImg.naturalHeight || 1000;
      const ratio = natH / natW;

      // Target display size: fill viewport at natural ratio
      const maxW  = Math.min(vw * 0.88, 1100);
      const maxH  = vh * 0.90;
      let targetW = maxW;
      if (targetW * ratio > maxH) targetW = maxH / ratio;
      const targetH = targetW * ratio;

      // Clone rests at viewport center
      const cloneL = (vw - targetW) / 2;
      const cloneT = (vh - targetH) / 2;

      // FLIP origin: image center within cell
      // object-fit:contain centers the image in the square cell
      const cellRect = cell.getBoundingClientRect();
      const S        = cellRect.width;           // cell side (square)
      const cellCx   = cellRect.left + S / 2;
      const cellCy   = cellRect.top  + S / 2;

      // FLIP scale: images are rendered at 0.9 of cell size (CSS scale(0.9) on .archive-item)
      // portrait fills 0.9×cell height → imgDispW = 0.9×S/ratio; landscape → 0.9×S
      const imgDispW  = ratio >= 1 ? S * 0.9 / ratio : S * 0.9;
      const flipScale = imgDispW / targetW;

      // FLIP translate: move clone centre from viewport centre to image centre
      const flipDx = cellCx - vw / 2;
      const flipDy = cellCy - vh / 2;

      // Disable all grid clicks while zoomed — prevents thumbnail hit-areas intercepting
      // the overlay and fixes the "outside click doesn't close" bug
      document.getElementById('archive-grid').style.pointerEvents = 'none';

      // Clone starts with the already-cached thumbnail src so animation plays instantly.
      // Full-res is preloaded in the background and swapped in once ready.
      const clone = document.createElement('img');
      clone.src = srcImg.src; // cached thumbnail — no loading wait, animation is immediate
      clone.style.cssText = [
        `position:fixed`,
        `left:${cloneL.toFixed(1)}px`,
        `top:${cloneT.toFixed(1)}px`,
        `width:${targetW.toFixed(1)}px`,
        `height:${targetH.toFixed(1)}px`,
        `object-fit:contain`,
        `z-index:300`,
        `pointer-events:none`,
        `transform-origin:center center`,
        `transform:translate(${flipDx.toFixed(1)}px,${flipDy.toFixed(1)}px) scale(${flipScale.toFixed(5)})`,
        `opacity:1`,
        `will-change:transform`,
      ].join(';');
      document.body.appendChild(clone);
      archiveZoomClone = clone;

      // Preload full-res in background — swap clone src once loaded (invisible swap
      // since dimensions are already set; animation is already playing by then)
      const fullSrc = srcImg.src.split('?')[0];
      if (fullSrc !== srcImg.src) {
        const preloader = new Image();
        preloader.onload = () => {
          if (archiveZoomedIndex === index && archiveZoomClone === clone) {
            clone.src = fullSrc;
          }
        };
        preloader.src = fullSrc;
      }

      // Dismiss overlay — created FIRST so outside-click is available immediately
      archiveZoomOverlay = document.createElement('div');
      archiveZoomOverlay.className = 'archive-zoom-overlay';
      archiveZoomOverlay.addEventListener('click', () => closeArchiveZoom());
      document.getElementById('page-archive').appendChild(archiveZoomOverlay);

      // Hide original cell instantly — clone is already sitting on top of it at full opacity
      cell.style.transition = 'none';
      cell.style.opacity    = '0';
      cell.classList.add('zoomed');

      // Dim other cells
      cells.forEach((c, i) => {
        if (i !== index) {
          c.style.transition = 'opacity 0.45s cubic-bezier(0.16, 1, 0.3, 1)';
          c.style.opacity    = '0.12';
        }
      });

      // Lock scroll
      document.documentElement.style.overflow = 'hidden';

      // Commit FLIP start state synchronously via reflow, then animate on next frame.
      // Single rAF (not double) — faster open, and includes guard so a fast close
      // cannot be overridden by this callback.
      clone.getBoundingClientRect(); // force synchronous layout — commits initial transform
      if (archiveOpenRafId) cancelAnimationFrame(archiveOpenRafId);
      archiveOpenRafId = requestAnimationFrame(() => {
        archiveOpenRafId = null;
        if (archiveZoomedIndex !== index) return; // closed before frame fired
        clone.style.transition = 'transform 0.58s cubic-bezier(0.16, 1, 0.3, 1)';
        clone.style.transform  = 'none';
      });
    }

    function closeArchiveZoom(instant) {
      if (archiveZoomedIndex === null) return;

      // Cancel pending open animation so it cannot override this close
      if (archiveOpenRafId) { cancelAnimationFrame(archiveOpenRafId); archiveOpenRafId = null; }

      const idx   = archiveZoomedIndex;
      archiveZoomedIndex = null;

      const cells = Array.from(document.querySelectorAll('#archive-grid .archive-cell'));
      const cell  = cells[idx];
      const clone = archiveZoomClone;
      archiveZoomClone = null;

      if (archiveZoomOverlay) { archiveZoomOverlay.remove(); archiveZoomOverlay = null; }
      document.documentElement.style.overflow = '';
      document.getElementById('archive-grid').style.pointerEvents = ''; // re-enable gallery clicks

      // Dim other cells back — they fade in while clone returns
      cells.forEach((c, i) => {
        if (i !== idx) {
          c.style.transition = 'opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
          c.style.opacity    = '';
        }
      });
      // Source cell stays hidden until the clone lands — revealed in the setTimeout below
      if (cell) cell.classList.remove('zoomed');

      if (!clone) {
        if (cell) { cell.style.transition = 'none'; cell.style.opacity = ''; }
        return;
      }

      if (instant) {
        clone.remove();
        if (cell) { cell.style.transition = 'none'; cell.style.opacity = ''; }
        return;
      }

      // Animate clone back to source position (pure transform — no opacity change)
      const cellRect = cell?.getBoundingClientRect();
      const vw       = window.innerWidth;
      const vh       = window.innerHeight;

      if (cellRect) {
        const srcImg    = cell.querySelector('img');
        const natW      = srcImg?.naturalWidth  || 800;
        const natH      = srcImg?.naturalHeight || 1000;
        const ratio     = natH / natW;
        const maxW      = Math.min(vw * 0.88, 1100);
        const maxH      = vh * 0.90;
        let   targetW   = maxW;
        if (targetW * ratio > maxH) targetW = maxH / ratio;
        const S         = cellRect.width;
        const imgDispW  = ratio >= 1 ? S * 0.9 / ratio : S * 0.9;
        const flipScale = imgDispW / targetW;
        const flipDx    = (cellRect.left + S / 2) - vw / 2;
        const flipDy    = (cellRect.top  + S / 2) - vh / 2;

        // Same easing as open — expo-out for a continuous, organic reverse
        clone.style.transition = 'transform 0.52s cubic-bezier(0.16, 1, 0.3, 1)';
        clone.style.transform  = `translate(${flipDx.toFixed(1)}px,${flipDy.toFixed(1)}px) scale(${flipScale.toFixed(5)})`;

        // Reveal source cell just as clone arrives so there's no double-image flash
        setTimeout(() => {
          clone.remove();
          if (cell) { cell.style.transition = 'none'; cell.style.opacity = ''; }
        }, 530);
      } else {
        // No cell rect — remove immediately
        clone.remove();
        if (cell) { cell.style.transition = 'none'; cell.style.opacity = ''; }
      }
    }

    /* ════════════════════════════════════════════════════════
       LIGHTBOX — slides up from bottom
       ════════════════════════════════════════════════════════ */
    function openLightbox(idx, items) {
      lightboxIndex = idx;
      currentItems = items;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.add('closing');
      lb.addEventListener('animationend', function onClose() {
        lb.removeEventListener('animationend', onClose);
        lb.classList.remove('open', 'closing');
        document.body.style.overflow = '';
      });
    }
    function updateLightbox() {
      const proj = currentItems[lightboxIndex];
      const img = document.getElementById('lb-img');
      img.classList.add('lb-transitioning');
      setTimeout(() => {
        img.src = proj.image + '?auto=format&w=1400&q=90';
        img.alt = proj.title;
        img.onload = () => img.classList.remove('lb-transitioning');
      }, 80);
      document.getElementById('lb-title').textContent = proj.title;
      document.getElementById('lb-subtitle').textContent = proj.subtitle;
      document.getElementById('lb-counter').textContent =
        `${String(lightboxIndex + 1).padStart(2,'0')} / ${String(currentItems.length).padStart(2,'0')}`;
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget || e.target.classList.contains('lightbox-inner')) closeLightbox();
    });
    document.getElementById('lb-prev').addEventListener('click', () => {
      lightboxIndex = (lightboxIndex - 1 + currentItems.length) % currentItems.length;
      updateLightbox();
    });
    document.getElementById('lb-next').addEventListener('click', () => {
      lightboxIndex = (lightboxIndex + 1) % currentItems.length;
      updateLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { lightboxIndex = (lightboxIndex - 1 + currentItems.length) % currentItems.length; updateLightbox(); }
      if (e.key === 'ArrowRight') { lightboxIndex = (lightboxIndex + 1) % currentItems.length; updateLightbox(); }
    });

    // Lightbox touch swipe (mobile)
    { const lb = document.getElementById('lightbox');
      let lbTouchX = 0;
      lb.addEventListener('touchstart', (e) => { lbTouchX = e.touches[0].clientX; }, { passive: true });
      lb.addEventListener('touchend', (e) => {
        if (!lb.classList.contains('open')) return;
        const dx = e.changedTouches[0].clientX - lbTouchX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) lightboxIndex = (lightboxIndex + 1) % currentItems.length;
          else        lightboxIndex = (lightboxIndex - 1 + currentItems.length) % currentItems.length;
          updateLightbox();
        }
      }, { passive: true });
    }

    /* ════════════════════════════════════════════════════════
       SLIDE-UP MENU
       ════════════════════════════════════════════════════════ */
    const menuOverlay = document.getElementById('menu-overlay');
    const menuBtn = document.getElementById('menu-btn');
    const menuClose = document.getElementById('menu-close');
    let menuOpen = false;
    let menuCurrentLink = null;
    const _menuIsTouch = 'ontouchstart' in window;

    // ── Build nav items from CONFIG.menuPages ─────────────────
    function buildMenuNav() {
      const nav = document.getElementById('menu-nav');
      if (!nav) return;
      nav.innerHTML = '';

      // Defensive: validate CONFIG and menuPages before rendering
      if (typeof CONFIG === 'undefined') {
        console.warn('[Menu] CONFIG not loaded — config.js may be missing or failed to parse. Menu cannot render.');
        return;
      }
      if (!Array.isArray(CONFIG.menuPages)) {
        // menuPages absent (e.g. stale config.js from old server) — retry once after 400ms
        console.warn('[Menu] CONFIG.menuPages missing — config.js may be outdated. Retrying in 400ms…');
        setTimeout(buildMenuNav, 400);
        return;
      }
      if (CONFIG.menuPages.length === 0) {
        console.warn('[Menu] CONFIG.menuPages is empty — no pages are set to inMenu=true & status=published in the CMS.');
        return;
      }
      const menuPages = CONFIG.menuPages;

      // Ensure preview image element exists in overlay
      const overlay = document.getElementById('menu-overlay');
      let previewEl = overlay.querySelector('.menu-preview');
      if (!previewEl) {
        previewEl = document.createElement('img');
        previewEl.className = 'menu-preview';
        previewEl.alt = '';
        previewEl.setAttribute('aria-hidden', 'true');
        overlay.appendChild(previewEl);
      }

      menuPages.forEach((pg) => {
        try {
          if (!pg || !pg.id || !pg.menuLabel) {
            console.warn('[Menu] Skipping invalid menu item (missing id or menuLabel):', pg);
            return;
          }
          const a = document.createElement('a');
          a.href = '#';
          a.className = 'menu-link';
          a.dataset.page = pg.id;
          a.dataset.template = pg.template || '';
          a.dataset.slug = pg.slug || pg.id;
          a.innerHTML = `<span class="menu-link-lbl">${pg.menuLabel}</span>`;
          nav.appendChild(a);
        } catch (err) {
          console.warn('[Menu] Error rendering item — skipped:', pg, err);
        }
      });
      attachMenuLinkEvents();
    }

    // ── Build footer from CONFIG ───────────────────────────────
    function buildMenuFooter() {
      const el = document.getElementById('menu-footer');
      if (!el || typeof CONFIG === 'undefined') return;
      const insta1     = CONFIG.instagram || '';
      const insta1Url  = CONFIG.instagramUrl || '#';
      const insta2     = CONFIG.pageContent?.info?.instagram2Label || '';
      const insta2Url  = CONFIG.pageContent?.info?.instagram2Url   || '#';
      el.innerHTML =
        `<span class="menu-footer-left">Melbourne</span>` +
        `<div class="menu-footer-right">` +
          (insta2 ? `<a href="${insta2Url}" target="_blank" rel="noopener" class="menu-footer-link">${insta2}</a>` : '') +
          (insta1 ? `<a href="${insta1Url}" target="_blank" rel="noopener" class="menu-footer-link">${insta1}</a>` : '') +
        `</div>`;
    }

    function openMenu() {
      menuOpen = true;
      menuOverlay.classList.remove('menu-ready');
      menuOverlay.classList.add('open');
      menuBtn.classList.add('hidden');
      document.body.classList.add('menu-open');
      // 1600ms covers all 10 item animations (last at 1.00s + 0.52s = 1.52s)
      setTimeout(() => { if (menuOpen) menuOverlay.classList.add('menu-ready'); }, 1600);
    }
    function closeMenu() {
      menuOpen = false;
      menuOverlay.classList.remove('open', 'menu-ready');
      menuBtn.classList.remove('hidden');
      document.body.classList.remove('menu-open');
    }

    menuBtn.addEventListener('click', openMenu);
    menuClose.addEventListener('click', closeMenu);

    // Fixed logo — navigate home
    const siteLogo = document.getElementById('site-logo');
    if (siteLogo) {
      siteLogo.addEventListener('click', e => {
        e.preventDefault();
        navigateTo((typeof CONFIG !== 'undefined' && CONFIG.homePage) ? CONFIG.homePage : 'intro');
      });
    }

    // Menu name — navigate home
