    document.getElementById('menu-name').addEventListener('click', e => {
      e.preventDefault();
      closeMenu();
      setTimeout(() => navigateTo((typeof CONFIG !== 'undefined' && CONFIG.homePage) ? CONFIG.homePage : 'intro'), 100);
    });

    function attachMenuLinkEvents() {
      const nav = document.getElementById('menu-nav');
      const previewEl = menuOverlay.querySelector('.menu-preview');
      let previewTimer = null;

      nav.querySelectorAll('.menu-link').forEach(link => {
        if (!_menuIsTouch) {
          link.addEventListener('mouseenter', () => {
            if (menuCurrentLink && menuCurrentLink !== link) menuCurrentLink.classList.remove('hovered');
            link.classList.add('hovered');
            menuCurrentLink = link;
            nav.classList.add('has-hover');
            menuOverlay.classList.add('has-item-hover');

            // Preview image reveal
            if (previewEl) {
              const pageId  = link.dataset.page;
              const ownGallery = (typeof CONFIG !== 'undefined' && CONFIG.pageGalleries?.[pageId]) || [];
              // Fall back to people → intro when page has no gallery (e.g. Info)
              const gallery = ownGallery.length > 0 ? ownGallery
                : (CONFIG.pageGalleries?.['people'] || CONFIG.pageGalleries?.['intro'] || []);
              clearTimeout(previewTimer);
              if (gallery.length > 0) {
                const imgUrl = gallery[0].image || gallery[0].url || '';
                if (imgUrl) {
                  if (previewEl.getAttribute('data-current') !== imgUrl) {
                    previewEl.classList.remove('visible');
                    previewTimer = setTimeout(() => {
                      previewEl.src = imgUrl;
                      previewEl.setAttribute('data-current', imgUrl);
                      // Force reflow so transition fires after src update
                      void previewEl.offsetHeight;
                      previewEl.classList.add('visible');
                    }, 30);
                  } else {
                    previewEl.classList.add('visible');
                  }
                } else {
                  previewEl.classList.remove('visible');
                }
              } else {
                previewEl.classList.remove('visible');
              }
            }
          });
          link.addEventListener('mouseleave', () => {
            link.classList.remove('hovered');
            if (menuCurrentLink === link) menuCurrentLink = null;
            setTimeout(() => {
              if (!menuCurrentLink) {
                nav.classList.remove('has-hover');
                menuOverlay.classList.remove('has-item-hover');
                if (previewEl) {
                  clearTimeout(previewTimer);
                  previewEl.classList.remove('visible');
                }
              }
            }, 50);
          });
        }
        link.addEventListener('click', e => {
          e.preventDefault();
          const tpl  = link.dataset.template;
          const slug = link.dataset.slug;
          const id   = link.dataset.page;
          closeMenu();
          if (tpl === 'archive-standalone' || tpl === 'filmstrip') {
            // Use /slug clean URL — server resolves slug → physical id.html file.
            setTimeout(() => { window.location.href = '/' + (slug || id); }, 120);
          } else {
            setTimeout(() => navigateTo(id), 100);
          }
        });
      });
    }

    // Page title links
    document.addEventListener('click', e => {
      const link = e.target.closest('.page-title-link');
      if (link) { e.preventDefault(); navigateTo(link.dataset.page); }
    });

    // Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && menuOpen) closeMenu();
    });

    // Initialise menu with backend data
    buildMenuNav();
    buildMenuFooter();

    /* ════════════════════════════════════════════════════════
       CUSTOM CURSOR
       ════════════════════════════════════════════════════════ */
    const cursor = document.getElementById('cursor');
    let cxPos = 0, cyPos = 0, pxPos = 0, pyPos = 0;
    const isTouch = 'ontouchstart' in window;
    const cursorSpan = cursor.querySelector('span');

    function setCursorLabel(label) {
      cursorSpan.textContent = label;
    }

    function reattachCursorEvents() {
      if (isTouch) return;
      document.querySelectorAll('.portfolio-item, .carousel-slide').forEach(item => {
        item.addEventListener('mouseenter', () => {
          setCursorLabel('View');
          cursor.classList.add('cursor--active');
        });
        item.addEventListener('mouseleave', () => {
          cursor.classList.remove('cursor--active');
        });
      });
    }

    if (!isTouch) {
      document.addEventListener('mousemove', e => { cxPos = e.clientX; cyPos = e.clientY; });
      (function loop() {
        pxPos += (cxPos - pxPos) * 0.12;
        pyPos += (cyPos - pyPos) * 0.12;
        cursor.style.transform = `translate(${pxPos}px, ${pyPos}px)`;
        requestAnimationFrame(loop);
      })();

      // Menu button → cursor label
      document.querySelectorAll('#menu-btn').forEach(el => {
        el.addEventListener('mouseenter', () => {
          setCursorLabel('Menu');
          cursor.classList.add('cursor--link', 'cursor--label');
        });
        el.addEventListener('mouseleave', () => cursor.classList.remove('cursor--link', 'cursor--label'));
      });

      // Site logo (top-left fixed) — cursor link style
      if (siteLogo) {
        siteLogo.addEventListener('mouseenter', () => cursor.classList.add('cursor--link'));
        siteLogo.addEventListener('mouseleave', () => cursor.classList.remove('cursor--link'));
      }

      // Menu links
      document.querySelectorAll('.menu-link, .menu-close, .menu-footer-link, .menu-name').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('cursor--link'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('cursor--link'));
      });

      // Page title links
      document.querySelectorAll('.page-title-link').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('cursor--link'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('cursor--link'));
      });

      // Other links
      document.querySelectorAll('.footer-email, .footer-social, .back-top, .about-links a, .lightbox-nav, .lightbox-close').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('cursor--link'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('cursor--link'));
      });
    } else {
      cursor.style.display = 'none';
    }

    /* ════════════════════════════════════════════════════════
       ARCHIVE — event listeners
       ════════════════════════════════════════════════════════ */
    // Navigate to adjacent image while zoomed (instant close → smooth open of next)
    function navigateArchiveZoom(dir) {
      if (archiveZoomedIndex === null) return;
      const total    = document.querySelectorAll('#archive-grid .archive-cell').length;
      const newIndex = (archiveZoomedIndex + dir + total) % total;
      closeArchiveZoom(true); // instant — no return animation
      openArchiveZoom(newIndex);
    }

    document.addEventListener('keydown', e => {
      if (archiveZoomedIndex === null) return;
      if (e.key === 'Escape')     { closeArchiveZoom(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); navigateArchiveZoom(1);  }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navigateArchiveZoom(-1); }
    });

    // Pathname-based deep linking — e.g. /people, /things, /personal-work
    // Resolves /slug → correct SPA section via CONFIG.allPages.
    // Also handles legacy /#hash URLs for backward compat with old bookmarks.
    {
      const _allPages = (typeof CONFIG !== 'undefined' && CONFIG.allPages) || [];
      // Strip leading / and trailing /
      const _pathSlug = location.pathname.replace(/^\/+|\/+$/g, '');

      function _resolveAndShow(slug) {
        // 1. Direct id match (slug === internal page id)
        if (pages.includes(slug)) { showPage(slug); return true; }
        // 2. Slug field match → map to id
        const bySlug = _allPages.find(p => (p.slug || p.id) === slug && pages.includes(p.id));
        if (bySlug) { showPage(bySlug.id); return true; }
        return false;
      }

      if (_pathSlug) {
        // Arriving at a clean URL like /people or /personal-work
        if (!_resolveAndShow(_pathSlug)) showPage(currentPage);
      } else if (location.hash) {
        // Legacy /#hash support — redirect to clean URL
        const hashPage = location.hash.slice(1);
        if (!_resolveAndShow(hashPage)) showPage(currentPage);
      } else {
        // Root / — show configured home page.
        // If home is a standalone page, redirect to its URL (server normally handles this,
        // but fallback here covers local dev or edge cases).
        const _homeMeta = _allPages.find(p => p.id === currentPage);
        if (_homeMeta && ['archive-standalone', 'filmstrip'].includes(_homeMeta.template)) {
          window.location.replace('/' + (_homeMeta.slug || currentPage));
        } else {
          showPage(currentPage);
        }
      }
    }

  })();
  </script>
</body>
</html>
