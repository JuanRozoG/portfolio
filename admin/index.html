<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Juan Rozo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login screen (shown when not authenticated) -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-box">
      <div class="login-logo">JR</div>
      <h1 class="login-title">Portfolio Admin</h1>
      <form id="login-form">
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="email" id="login-email" class="field-input" placeholder="Enter email" autocomplete="username email" />
        </div>
        <div class="field-group">
          <label class="field-label">Password</label>
          <input type="password" id="login-password" class="field-input" placeholder="Enter password" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        <p id="login-error" class="login-error hidden">Incorrect email or password. Try again.</p>
      </form>
    </div>
  </div>

  <!-- Main admin layout -->
  <div id="admin-app" class="admin-app hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">JR</span>
        <span class="sidebar-title">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard"  class="nav-item" data-view="dashboard">
          <svg viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zm8-8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
          Dashboard
        </a>
        <a href="#pages"      class="nav-item" data-view="pages">
          <svg viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z"/></svg>
          Pages
        </a>
        <a href="#projects"   class="nav-item" data-view="projects">
          <svg viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm3 2h6v4H7V5zm-2 8h2v2H5v-2zm4 0h2v2H9v-2zm4 0h2v2h-2v-2z"/></svg>
          Projects
        </a>
        <a href="#navigation" class="nav-item" data-view="navigation">
          <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
          Navigation
        </a>
        <a href="#images"     class="nav-item" data-view="images">
          <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg>
          Media Library
        </a>
        <a href="#settings"   class="nav-item" data-view="settings">
          <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank" class="sidebar-view-site">
          <svg viewBox="0 0 20 20"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
          View site
        </a>
        <button class="sidebar-logout" id="btn-logout">Log out</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-area">
      <div id="view-container"></div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
