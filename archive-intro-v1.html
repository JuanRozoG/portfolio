<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Rozo — Archive: Intro v1</title>
  <link rel="icon" type="image/png" href="https://juanrozo.com/wp-content/uploads/2024/05/Artboard-2.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@900&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --font-display: 'Hanken Grotesk', 'Helvetica Neue', Arial, sans-serif;
      --fw: 900;
      --color-red: #ff3232;
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 0;
      background: #fff;
      overflow: hidden;
      font-family: var(--font-display);
      font-weight: var(--fw);
      -webkit-font-smoothing: antialiased;
      color: #0a0a0a;
    }

    .archive-back    { display: none; }
    .archive-version { display: none; }

    /* Global header — logo top-left */
    .site-logo {
      position: fixed;
      top: 21px; left: 24px;
      z-index: 200;
      
      line-height: 0;
      
      text-decoration: none; cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .site-logo img { height: 40px; width: auto; display: block; }
    .site-logo:hover { opacity: 0.5; }
    body.menu-open .site-logo { opacity: 0; pointer-events: none; }
    @media (max-width: 768px) {
      .site-logo { top: max(12px, env(safe-area-inset-top, 12px)); left: 16px; }
    }

    /* Intro v1 layout */
    .v1-intro {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Name animation */
    .v1-name {
      font-family: var(--font-display);
      font-size: clamp(48px, 12vw, 120px);
      font-weight: 900;
      letter-spacing: -5.76px;
      line-height: 0.71;
      text-transform: uppercase;
      text-align: center;
      color: #0a0a0a;
      margin: 0;
      z-index: 5;
      transition: color 0.2s;
      cursor: default;
      opacity: 0;
      transform: translateY(30px);
    }
    .v1-name.revealed {
      opacity: 1;
      transform: translateY(0);
      transition: color 0.2s, opacity 0.8s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .v1-name:hover { color: var(--color-red); }

    /* Tagline animation */
    .v1-tagline {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.48px;
      color: #0a0a0a;
      margin-top: 12px;
      text-align: center;
      z-index: 5;
      opacity: 0;
      transform: translateY(20px);
    }
    .v1-tagline.revealed {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.7s ease, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Thumbnail strip */
    .v1-thumbs {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      /* Fixed height defines the baseline strip. Images that grow taller than
         this strip overflow upward and are shown fully — no clipping. */
      height: 15vh;
      overflow: visible;
      z-index: 4;
    }
    .v1-thumb {
      flex: 1 1 0%;
      min-width: 0;
      overflow: visible;
      height: 100%;           /* fill the fixed 15vh strip */
      position: relative;     /* contain the absolutely-positioned image */
      opacity: 0;
      transform: translateY(40px);
      /* flex-grow animates the expand; opacity+transform run the entrance once */
      transition: flex-grow 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.8s ease,
                  transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .v1-thumb.revealed {
      opacity: 1;
      transform: translateY(0);
      transition: flex-grow 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.8s ease,
                  transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    /* Once the entrance animation has played, lock opacity + transform out of
       the transition so hover interactions can never re-trigger them. */
    .v1-thumb.settled {
      transition: flex-grow 0.65s cubic-bezier(0.22, 1, 0.36, 1) !important;
    }
    .v1-thumb img {
      /* Absolute positioning anchored to bottom of thumb.
         width: 100% always fills the full thumb width — no side white space
         regardless of aspect ratio or how much the thumb expands.
         height: auto preserves natural aspect ratio without distortion.
         Overflow at the top is clipped by the thumb's overflow: hidden. */
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: auto;
      display: block;
    }

    /* Menu overlay CSS → shared.css (injected by server.py) */
  </style>
</head>
<body>
  <!-- ── GLOBAL HEADER — logo top-left, menu icon top-right ──── -->
  <a href="/" class="site-logo" id="site-logo" aria-label="Home"><img src="/images/logo.svg" alt="Juan Rozo" /></a>
  <button class="menu-btn" id="menu-btn" aria-label="Menu">+</button>

  <!-- ── SLIDE-UP MENU ──────────────────────────────────────────── -->
  <div class="menu-overlay" id="menu-overlay">
    <a href="/" class="menu-name" id="menu-name"><img src="/images/logo.svg" alt="Juan Rozo" /></a>
    <nav class="menu-nav" id="menu-nav"></nav>
    <div class="menu-footer" id="menu-footer"></div>
    <button class="menu-close" id="menu-close" aria-label="Close menu">+</button>
  </div>

  <a href="archive.html" class="archive-back">&larr; Back to Archive</a>
  <span class="archive-version">Intro v1</span>

  <div class="v1-intro">
    <h1 class="v1-name" id="v1-name"></h1>
    <p class="v1-tagline" id="v1-tagline">Melbourne based. Photographer &amp; Art-director. EST 2020</p>
    <div class="v1-thumbs" id="v1-thumbs"></div>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('v1-name').textContent = CONFIG.name;

    const thumbsWrap = document.getElementById('v1-thumbs');
    const introPeople   = (CONFIG.pageGalleries?.people          || []).slice(0, 5);
    const introThings   = (CONFIG.pageGalleries?.things          || []).slice(0, 4);
    const introPersonal = (CONFIG.pageGalleries?.['personal-v2'] || []).slice(0, 4);
    const introProjects = [];
    const maxLen = Math.max(introPeople.length, introThings.length, introPersonal.length);
    for (let i = 0; i < maxLen; i++) {
      if (i < introPeople.length)   introProjects.push(introPeople[i]);
      if (i < introThings.length)   introProjects.push(introThings[i]);
      if (i < introPersonal.length) introProjects.push(introPersonal[i]);
    }
    introProjects.forEach(proj => {
      const div = document.createElement('div');
      div.className = 'v1-thumb';
      div.innerHTML = `<img src="${proj.image}?auto=format&w=200&q=75" alt="${proj.title}" loading="lazy" />`;
      thumbsWrap.appendChild(div);
    });

    // ── Hover expand — hovered thumb grows to 2× each sibling via flex-grow ──
    // NOTE: Chrome ignores inline flex-basis overrides when the class uses
    // the flex shorthand (cascade quirk). flex-grow inline works correctly.
    // flex-grow: 2 on hovered → gets 2× the flex space. Others stay at 1.
    (function initThumbExpand() {
      const allThumbs = Array.from(thumbsWrap.querySelectorAll('.v1-thumb'));
      let currentHovered = null;
      let currentImg     = null;  // tracks img element whose overflow we're listening to

      // Container geometry — cached for cursor slot detection.
      // Slots are fixed equal divisions of container width, immune to the
      // animated flex layout so pointermove detection stays stable.
      let containerLeft = null;
      let slotW         = null;

      function cacheGeometry() {
        const rect    = thumbsWrap.getBoundingClientRect();
        containerLeft = rect.left;
        slotW         = rect.width / allThumbs.length;
      }

      window.addEventListener('resize', () => { containerLeft = null; slotW = null; });

      function thumbAtX(clientX) {
        if (containerLeft === null) cacheGeometry();
        const idx = Math.max(0, Math.min(
          Math.floor((clientX - containerLeft) / slotW),
          allThumbs.length - 1
        ));
        return allThumbs[idx];
      }

      // When cursor leaves an image's overflow area into something outside
      // the strip, reset. If it re-enters the strip, pointermove takes over.
      function onImgPointerLeave(e) {
        const rel = e.relatedTarget;
        if (rel && (rel === thumbsWrap || thumbsWrap.contains(rel))) return;
        resetWidths();
      }

      function setWidths(hoveredThumb) {
        allThumbs.forEach(t => {
          t.style.flexGrow = t === hoveredThumb ? '2' : '1';
        });
        // Attach pointerleave to the image so cursor entering the overflow
        // region above the strip doesn't lose tracking.
        if (currentImg) currentImg.removeEventListener('pointerleave', onImgPointerLeave);
        currentImg = hoveredThumb.querySelector('img');
        if (currentImg) currentImg.addEventListener('pointerleave', onImgPointerLeave);
      }

      function resetWidths() {
        currentHovered = null;
        if (currentImg) {
          currentImg.removeEventListener('pointerleave', onImgPointerLeave);
          currentImg = null;
        }
        // Clear inline flex-grow → CSS flex:1 1 0% takes over (equal distribution)
        allThumbs.forEach(t => { t.style.flexGrow = ''; });
      }

      // pointermove: fires only on real cursor movement, never on layout shifts.
      thumbsWrap.addEventListener('pointermove', e => {
        const thumb = thumbAtX(e.clientX);
        if (thumb !== currentHovered) {
          currentHovered = thumb;
          setWidths(thumb);
        }
      });

      // Only reset when cursor truly leaves the strip (not into an image overflow).
      thumbsWrap.addEventListener('pointerleave', e => {
        const rel = e.relatedTarget;
        if (rel && thumbsWrap.contains(rel)) return;
        resetWidths();
      });
    })();

    // ── Staggered entrance animations ──────────────────────
    // Name appears first
    setTimeout(() => {
      document.getElementById('v1-name').classList.add('revealed');
    }, 300);

    // Tagline follows
    setTimeout(() => {
      document.getElementById('v1-tagline').classList.add('revealed');
    }, 600);

    // Thumbnails stagger in from left to right.
    // After the entrance transition finishes (transform: 1s), add .settled to
    // remove opacity + transform from the transition — they can never replay on hover.
    const thumbs = document.querySelectorAll('.v1-thumb');
    thumbs.forEach((thumb, i) => {
      const delay = 800 + i * 80 + (Math.random() * 60 - 30);
      setTimeout(() => {
        thumb.classList.add('revealed');
        setTimeout(() => thumb.classList.add('settled'), 1050);
      }, delay);
    });

    // Menu: handled by shared.js (injected by server.py)
  </script>
</body>
</html>
