<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Rozo — Archive</title>
  <link rel="icon" type="image/png" href="https://juanrozo.com/wp-content/uploads/2024/05/Artboard-2.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@900&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --font-display: 'Hanken Grotesk', 'Helvetica Neue', Arial, sans-serif;
      --fw: 900;
    }
    body {
      margin: 0; padding: 60px 24px;
      background: #0a0a0a;
      color: #fff;
      font-family: var(--font-display);
      font-weight: var(--fw);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .archive-back {
      position: fixed;
      top: 14px; left: 24px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
      font-family: var(--font-display);
      font-weight: 900;
      z-index: 10;
    }
    .archive-back:hover { color: #fff; }

    .archive-header {
      margin-top: 40px;
      margin-bottom: 48px;
    }
    .archive-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin: 0;
    }

    .archive-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .archive-list li {
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 0;
    }
    .archive-list li:last-child {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .archive-list a {
      font-size: clamp(22px, 3.5vw, 36px);
      font-weight: 900;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.15s;
      line-height: 1.15;
      flex: 1;
    }
    .archive-list a:hover { color: #fff; }

    .page-template {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    .status-badge {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff3232;
      border: 1px solid rgba(255,50,50,0.4);
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
    }

    .archive-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <a href="/" class="archive-back">&larr; Back to site</a>

  <div class="archive-header">
    <p class="archive-title">All pages</p>
  </div>

  <ul class="archive-list" id="archive-list">
    <!-- populated dynamically from config.js -->
  </ul>

  <p class="archive-count" id="archive-count"></p>

  <script src="config.js"></script>
  <script>
    (function () {
      var list  = document.getElementById('archive-list');
      var count = document.getElementById('archive-count');
      var pages = (typeof CONFIG !== 'undefined' && CONFIG.allPages) ? CONFIG.allPages : [];

      if (!pages.length) {
        list.innerHTML = '<li><span style="color:rgba(255,255,255,0.3);font-size:14px">No pages found.</span></li>';
        return;
      }

      pages.forEach(function (page) {
        // All pages use /slug clean URL — server resolves to correct content.
        // Standalone pages get their physical id.html served; SPA pages get index.html.
        var slug = page.slug || page.id;
        var href = '/' + slug;

        var li  = document.createElement('li');

        var a   = document.createElement('a');
        a.href  = href;
        a.textContent = page.title || page.id;
        li.appendChild(a);

        // Template tag
        if (page.template) {
          var tpl = document.createElement('span');
          tpl.className   = 'page-template';
          tpl.textContent = page.template;
          li.appendChild(tpl);
        }

        // Draft badge (only for non-published)
        if (page.status && page.status !== 'published') {
          var badge = document.createElement('span');
          badge.className   = 'status-badge';
          badge.textContent = page.status;
          li.appendChild(badge);
        }

        list.appendChild(li);
      });

      count.textContent = pages.length + ' page' + (pages.length !== 1 ? 's' : '');
    })();
  </script>
</body>
</html>
