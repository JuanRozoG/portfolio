<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Rozo — Archive</title>
  <link rel="icon" type="image/png" href="https://juanrozo.com/wp-content/uploads/2024/05/Artboard-2.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@900&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --font-display: 'Hanken Grotesk', 'Helvetica Neue', Arial, sans-serif;
      --fw: 900;
      --color-red: #ff3232;
    }
    body {
      margin: 0; padding: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: var(--font-display);
      font-weight: var(--fw);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .archive-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin: 0 0 48px;
    }

    .archive-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .archive-list a {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
      line-height: 1.1;
    }
    .archive-list a:hover {
      color: #fff;
    }

    .archive-back {
      position: fixed;
      top: 14px; left: 24px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
      font-family: var(--font-display);
      font-weight: 900;
    }
    .archive-back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href="index.html" class="archive-back">&larr; Back to site</a>

  <p class="archive-title">Archive</p>

  <ul class="archive-list">
    <li><a href="archive-intro-v1.html">Intro v1</a></li>
    <li><a href="archive-personal-v1.html">Personal v1</a></li>
    <li><a href="archive-intro-loader-v1.html">Intro — stagger loader (before stack)</a></li>
    <li><a href="/#archive">Hidden Gallery</a></li>
    <li><a href="archive-filmstrip-v1.html">Filmstrip v1</a></li>
  </ul>
</body>
</html>
