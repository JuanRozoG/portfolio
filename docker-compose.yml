services:
  portfolio:
    build: .
    container_name: juanrozo-portfolio
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persistent data — survives container restarts and rebuilds
      - ./data:/app/data
      - ./uploads:/app/uploads
      # config.js is regenerated by server on every save — persisted too
      - ./config.js:/app/config.js
    environment:
      - ADMIN_PASSWORD=portfolio2026
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
