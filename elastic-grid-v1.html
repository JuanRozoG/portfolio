<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Juan Rozo — Grid</title>
  <link rel="icon" type="image/png" href="https://juanrozo.com/wp-content/uploads/2024/05/Artboard-2.png" />
  <link rel="stylesheet" href="/shared.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@900&display=swap');

    @font-face {
      font-family: NeueHaasGroteskDisplay;
      src: url('/fonts/NeueHaasGroteskDisplay-Black.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-display: NeueHaasGroteskDisplay, 'Hanken Grotesk', 'Helvetica Neue', Arial, sans-serif;
      --fw: 900;
      --red: #ff3232;
      --page-padding: 5vw;
      --c-gap: 2vw;
      --r-gap: 2vw;
      --column-size: 120px;
      --column-count: 3;
    }

    html {
      font-size: 14px;
    }

    html, body {
      width: 100%;
      background: #fff;
    }

    body {
      font-family: var(--font-display);
      font-weight: var(--fw);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      animation: bodyReveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Loading screen — GSAP imagesloaded removes .loading class */
    @media (scripting: enabled) {
      body.loading::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: #fff;
      }
      body.loading::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 80px;
        height: 1px;
        margin-left: -40px;
        z-index: 10001;
        background: rgba(10, 10, 10, 0.2);
        animation: loaderAnim 1.5s ease-in-out infinite alternate forwards;
      }
    }

    @keyframes loaderAnim {
      0%   { transform: scaleX(0);   transform-origin: 0% 50%; }
      50%  { transform: scaleX(1);   transform-origin: 0% 50%; }
      50.1%{ transform: scaleX(1);   transform-origin: 100% 50%; }
      100% { transform: scaleX(0);   transform-origin: 100% 50%; }
    }

    @keyframes bodyReveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Grid layout ──────────────────────────────────────────── */
    #smooth-wrapper {
      overflow: hidden;
      position: fixed;
      inset: 0;
    }

    #smooth-content {
      will-change: transform;
    }

    .eg-grid {
      display: grid;
      padding: 110px var(--page-padding) 8rem;
      margin: 0 auto;
      grid-template-columns: repeat(var(--column-count), minmax(var(--column-size), 1fr));
      column-gap: var(--c-gap);
      row-gap: var(--r-gap);
    }

    @media screen and (min-width: 65em) {
      :root { --column-count: 5; }
    }

    @media screen and (min-width: 90em) {
      :root { --column-count: 7; }
    }

    .eg-grid__column {
      display: flex;
      flex-direction: column;
      gap: var(--r-gap);
    }

    .eg-grid__item {
      margin: 0;
      cursor: none;
    }

    .eg-grid__item-img {
      overflow: hidden;
      display: block;
      width: 100%;
    }

    .eg-grid__item-img img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .eg-grid__item-caption {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      color: rgba(10,10,10,0.35);
    }

    /* ── Chrome UI ──────────────────────────────────────────────── */
    .ui-name {
      position: fixed;
      top: max(21px, env(safe-area-inset-top, 21px));
      left: 24px;
      z-index: 200;
      line-height: 0;
      color: #0a0a0a;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }
    .ui-name:hover { opacity: 0.5; }

    /* Staggered UI entrance */
    .ui-name, .menu-btn {
      opacity: 0;
      animation: uiIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    @keyframes uiIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Empty state */
    .eg-empty {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(10,10,10,.3);
    }

    /* Mobile: tighter gaps */
    @media (max-width: 600px) {
      :root {
        --c-gap: 3vw;
        --r-gap: 3vw;
        --page-padding: 3vw;
      }
      .eg-grid { padding-top: 90px; }
    }

    /* ── Click-to-expand transition ──────────────────────────────── */
    .eg-grid__item { will-change: opacity, transform, clip-path; }
    .eg-grid__item-img img { transition: opacity 0.2s cubic-bezier(0.2, 0, 0.2, 1); }
    .eg-grid__item:hover .eg-grid__item-img img { opacity: 0.6; }

    /* Fullscreen panel */
    .rit-panel {
      position: fixed;
      inset: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 2000;
      background: #fff;
    }

    .rit-panel__img {
      overflow: hidden;
      will-change: clip-path;
    }

    .rit-panel__img img {
      display: block;
      max-height: 85vh;
      max-width: 85vw;
      width: auto;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .rit-panel__close {
      position: fixed;
      top: max(14px, env(safe-area-inset-top, 14px));
      right: 24px;
      background: none;
      border: 0;
      padding: 0;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 48px;
      line-height: 1;
      cursor: none;
      color: var(--red);
      z-index: 2001;
      opacity: 0;
      transform: rotate(45deg);
      transition: opacity 0.2s ease;
    }
    .rit-panel__close:hover { opacity: 0.5; }

    /* Flying mover copies */
    .rit-mover {
      position: fixed;
      background-size: cover;
      background-position: 50% 50%;
      will-change: clip-path, opacity;
      pointer-events: none;
      z-index: 1500;
    }
  </style>
</head>
<body class="loading">

  <!-- ── MENU BUTTON (+, red, top-right) ──────────────────────── -->
  <button class="menu-btn" id="menu-btn" aria-label="Menu">+</button>

  <!-- ── SLIDE-UP MENU ──────────────────────────────────────────── -->
  <div class="menu-overlay" id="menu-overlay">
    <a href="/" class="menu-name" id="menu-name"><img src="/images/logo.svg" alt="Juan Rozo" /></a>
    <nav class="menu-nav" id="menu-nav"></nav>
    <div class="menu-footer" id="menu-footer"></div>
    <button class="menu-close" id="menu-close" aria-label="Close menu">+</button>
  </div>

  <!-- ── Logo top-left ──────────────────────────────────────────── -->
  <a href="/" class="ui-name"><img src="/images/logo.svg" alt="Juan Rozo" style="height:40px;width:auto;display:block;" /></a>

  <!-- ── Image transition panel (fullscreen, outside smooth-wrapper) ── -->
  <figure class="rit-panel" id="rit-panel">
    <div class="rit-panel__img" id="rit-panel-img">
      <img id="rit-panel-img-el" alt="" draggable="false" />
    </div>
    <button type="button" class="rit-panel__close" id="rit-panel-close" aria-label="Close">+</button>
  </figure>

  <!-- ── ScrollSmoother wrapper ─────────────────────────────────── -->
  <div id="smooth-wrapper">
    <div id="smooth-content">
      <div class="eg-grid" id="eg-grid">
        <!-- populated by JS from CONFIG.pageGalleries -->
      </div>
    </div>
  </div>

  <!-- GSAP stack -->
  <script src="/js/elastic-grid/gsap.min.js"></script>
  <script src="/js/elastic-grid/ScrollTrigger.min.js"></script>
  <script src="/js/elastic-grid/ScrollSmoother.min.js"></script>
  <script src="/js/elastic-grid/imagesloaded.pkgd.min.js"></script>

  <!-- Portfolio config -->
  <script src="/config.js"></script>

  <script>
  (() => {
    'use strict';

    /* ── Pull images from config ───────────────────────────────── */
    const pageId   = 'elastic-grid-v1';
    const galleries = CONFIG.pageGalleries || {};
    let pool = galleries[pageId] || [];

    // Fallback: use all available images if this page has no gallery yet
    if (!pool.length) {
      pool = Object.values(galleries).flat();
    }

    const grid = document.getElementById('eg-grid');

    if (!pool.length) {
      document.body.classList.remove('loading');
      grid.innerHTML = '';
      document.body.insertAdjacentHTML('beforeend',
        '<div class="eg-empty">No images available</div>');
      return;
    }

    /* ── Build grid items ──────────────────────────────────────── */
    pool.forEach(item => {
      const src = (item.image || item.url || '');
      const srcFmt = src + (src.includes('?') ? '&' : '?') + 'auto=format&w=800&q=85';
      const caption = item.title || item.alt || '';

      const figure = document.createElement('figure');
      figure.className = 'eg-grid__item';

      const imgWrap = document.createElement('div');
      imgWrap.className = 'eg-grid__item-img';

      const img = document.createElement('img');
      img.src = srcFmt;
      img.alt = caption;
      img.loading = 'lazy';
      img.draggable = false;

      imgWrap.appendChild(img);
      figure.appendChild(imgWrap);
      grid.appendChild(figure);
    });

    /* ── Elastic scroll engine (GSAP) ─────────────────────────── */
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother);

    const smoother = ScrollSmoother.create({
      wrapper:         '#smooth-wrapper',
      content:         '#smooth-content',
      smooth:          1,
      effects:         true,
      normalizeScroll: true,
    });
    // Expose globally so the transition script can pause/resume scroll
    window._gridSmoother = smoother;

    const originalItems = Array.from(grid.querySelectorAll('.eg-grid__item'));

    const baseLag  = 0.5;  // lag on the center column
    const lagScale = 0.12; // additional lag per column from center

    function groupItemsByColumn() {
      const cols = window.getComputedStyle(grid)
        .getPropertyValue('grid-template-columns')
        .trim().split(' ').filter(Boolean).length;

      const columns = Array.from({ length: cols }, () => []);
      grid.querySelectorAll('.eg-grid__item').forEach((item, i) => {
        columns[i % cols].push(item);
      });
      return { columns, numColumns: cols };
    }

    function clearGrid() {
      grid.querySelectorAll('.eg-grid__column').forEach(c => c.remove());
      originalItems.forEach(item => grid.appendChild(item));
    }

    function buildGrid(columns, numColumns) {
      const frag   = document.createDocumentFragment();
      const mid    = (numColumns - 1) / 2;
      const result = [];

      columns.forEach((column, i) => {
        const distance = Math.abs(i - mid);
        const lag      = baseLag + distance * lagScale;
        const col      = document.createElement('div');
        col.className  = 'eg-grid__column';
        column.forEach(item => col.appendChild(item));
        frag.appendChild(col);
        result.push({ element: col, lag });
      });

      grid.appendChild(frag);
      return result;
    }

    function applyLag(colContainers) {
      colContainers.forEach(({ element, lag }) => {
        smoother.effects(element, { speed: 1, lag });
      });
    }

    let currentCols = null;

    function init() {
      clearGrid();
      const { columns, numColumns } = groupItemsByColumn();
      currentCols = numColumns;
      const containers = buildGrid(columns, numColumns);
      applyLag(containers);
    }

    window.addEventListener('resize', () => {
      const n = window.getComputedStyle(grid)
        .getPropertyValue('grid-template-columns')
        .trim().split(' ').filter(Boolean).length;
      if (n !== currentCols) init();
    });

    /* ── Wait for images, then boot ────────────────────────────── */
    imagesLoaded(grid, () => {
      document.body.classList.remove('loading');
      init();
    });

    // Safety: remove loading state after 3s regardless
    setTimeout(() => {
      document.body.classList.remove('loading');
      if (!currentCols) init();
    }, 3000);

  })();
  </script>

  <!-- ── Click-to-expand transition (adapted from Codrops RepeatingImageTransition) ── -->
  <script>
  (() => {
    'use strict';

    /* ── Animation config ──────────────────────────────────────── */
    const cfg = {
      clipPathDirection:        'top-bottom',
      steps:                    6,
      stepDuration:             0.35,
      stepInterval:             0.05,
      moverPauseBeforeExit:     0.14,
      rotationRange:            0,
      wobbleStrength:           0,
      panelRevealEase:          'sine.inOut',
      gridItemEase:             'sine',
      moverEnterEase:           'sine.in',
      moverExitEase:            'sine',
      panelRevealDurationFactor: 2,
      clickedItemDurationFactor: 2,
      gridItemStaggerFactor:    0.3,
      pathMotion:               'linear',
      sineAmplitude:            50,
      sineFrequency:            Math.PI,
    };
    const origCfg = { ...cfg };

    const lerp = (a, b, t) => a + (b - a) * t;

    /* ── DOM refs ──────────────────────────────────────────────── */
    const panel      = document.getElementById('rit-panel');
    const panelImg   = document.getElementById('rit-panel-img');
    const panelClose = document.getElementById('rit-panel-close');

    let isAnimating = false;
    let isPanelOpen = false;
    let currentItem = null;

    /* ── Helpers ───────────────────────────────────────────────── */
    const elCenter = el => {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    };

    const getClipPaths = dir => {
      switch (dir) {
        case 'bottom-top': return { from:'inset(0% 0% 100% 0%)',  reveal:'inset(0% 0% 0% 0%)', hide:'inset(100% 0% 0% 0%)' };
        case 'left-right': return { from:'inset(0% 100% 0% 0%)',  reveal:'inset(0% 0% 0% 0%)', hide:'inset(0% 0% 0% 100%)' };
        case 'right-left': return { from:'inset(0% 0% 0% 100%)',  reveal:'inset(0% 0% 0% 0%)', hide:'inset(0% 100% 0% 0%)' };
        default:           return { from:'inset(100% 0% 0% 0%)',  reveal:'inset(0% 0% 0% 0%)', hide:'inset(0% 0% 100% 0%)' };
      }
    };

    /* ── Extract image URL + caption from a grid item ──────────── */
    const extractData = item => {
      const img = item.querySelector('.eg-grid__item-img img');
      const cap = item.querySelector('.eg-grid__item-caption');
      // Grid-res URL (already cached — instant natural dimensions)
      const gridSrc = img ? img.src : '';
      // High-res URL for panel after animation settles
      const src     = gridSrc.replace(/w=\d+/, 'w=1600').replace(/q=\d+/, 'q=90');
      // Movers use grid-res (cached, fast)
      const imgURL  = gridSrc ? 'url("' + gridSrc + '")' : '';
      const title   = cap ? cap.textContent.trim() : '';
      return { imgURL, title, gridSrc, src };
    };

    /* ── Motion path between two rects ────────────────────────── */
    const buildPath = (startR, endR, steps) => {
      const n  = steps + 2;
      const sc = { x: startR.left + startR.width  / 2, y: startR.top + startR.height / 2 };
      const ec = { x: endR.left   + endR.width    / 2, y: endR.top   + endR.height   / 2 };
      const pts = [];
      for (let i = 0; i < n; i++) {
        const t  = i / (n - 1);
        const w  = lerp(startR.width,  endR.width,  t);
        const h  = lerp(startR.height, endR.height, t);
        const cx = lerp(sc.x, ec.x, t);
        const cy = lerp(sc.y, ec.y, t);
        const sine = cfg.pathMotion === 'sine' ? Math.sin(t * cfg.sineFrequency) * cfg.sineAmplitude : 0;
        pts.push({ left: cx - w / 2, top: cy - h / 2 + sine, width: w, height: h });
      }
      return pts.slice(1, -1); // trim first and last (source/destination)
    };

    /* ── Stagger delays based on distance from clicked item ────── */
    const staggerDelays = (clicked, items) => {
      const base = elCenter(clicked);
      const dists = Array.from(items).map(el => {
        const c = elCenter(el);
        return Math.hypot(c.x - base.x, c.y - base.y);
      });
      const max = Math.max(...dists) || 1;
      return dists.map(d => (d / max) * cfg.gridItemStaggerFactor);
    };

    /* ── Animate grid items out ────────────────────────────────── */
    const gridOut = (items, clicked, delays) => {
      const cp = getClipPaths(cfg.clipPathDirection);
      gsap.to(items, {
        opacity:  0,
        scale:    (i, el) => el === clicked ? 1 : 0.85,
        duration: (i, el) => el === clicked ? cfg.stepDuration * cfg.clickedItemDurationFactor : 0.3,
        ease:     cfg.gridItemEase,
        clipPath: (i, el) => el === clicked ? cp.from : 'none',
        delay:    (i) => delays[i],
      });
    };

    /* ── Fly movers + reveal panel ─────────────────────────────── */
    const runTransition = (startEl, endEl, imgURL) => {
      const path = buildPath(startEl.getBoundingClientRect(), endEl.getBoundingClientRect(), cfg.steps);
      const cp   = getClipPaths(cfg.clipPathDirection);

      path.forEach((step, idx) => {
        const mover = document.createElement('div');
        mover.className = 'rit-mover';
        gsap.set(mover, {
          backgroundImage: imgURL,
          left:     step.left,
          top:      step.top,
          width:    step.width,
          height:   step.height,
          clipPath: cp.hide,
          zIndex:   1500 + idx,
          rotationZ: gsap.utils.random(-cfg.rotationRange, cfg.rotationRange),
        });
        document.body.appendChild(mover);

        gsap.timeline({ delay: idx * cfg.stepInterval })
          .fromTo(mover,
            { opacity: 0.4, clipPath: cp.hide },
            { opacity: 1,   clipPath: cp.reveal, duration: cfg.stepDuration, ease: cfg.moverEnterEase })
          .to(mover,
            { clipPath: cp.from, duration: cfg.stepDuration, ease: cfg.moverExitEase },
            '+=' + cfg.moverPauseBeforeExit);
      });

      // Remove movers after they finish
      const cleanupDelay = cfg.steps * cfg.stepInterval + cfg.stepDuration * 2 + cfg.moverPauseBeforeExit + 0.1;
      gsap.delayedCall(cleanupDelay, () => document.querySelectorAll('.rit-mover').forEach(m => m.remove()));

      // Reveal panel
      gsap.set(panel, { opacity: 1, pointerEvents: 'auto' });
      gsap.set(panelClose, { opacity: 0 });
      gsap.timeline({
        defaults: { duration: cfg.stepDuration * cfg.panelRevealDurationFactor, ease: cfg.panelRevealEase }
      })
        .fromTo(endEl,
          { clipPath: cp.hide },
          { clipPath: cp.reveal, delay: cfg.steps * cfg.stepInterval })
        .to(panelClose,
          { opacity: 1, duration: 0.4, ease: 'sine',
            onComplete: () => { isAnimating = false; isPanelOpen = true; } },
          '<');
    };

    /* ── Handle click on grid item ─────────────────────────────── */
    const onItemClick = item => {
      if (isAnimating || isPanelOpen) return;
      isAnimating  = true;
      currentItem  = item;

      if (window._gridSmoother) window._gridSmoother.paused(true);

      const { imgURL, gridSrc, src } = extractData(item);
      const panelImgEl = document.getElementById('rit-panel-img-el');

      // Use grid-res (already cached) so the <img> is sized at its natural
      // aspect ratio in one rAF — no waiting for the high-res fetch.
      panelImgEl.src = gridSrc;
      panelImgEl.alt = '';

      const allItems = document.querySelectorAll('.eg-grid__item');
      const delays   = staggerDelays(item, allItems);
      gridOut(allItems, item, delays);

      // One rAF so browser lays out the panel <img> at its natural size
      // before we read panelImg.getBoundingClientRect() in runTransition.
      requestAnimationFrame(() => {
        runTransition(item.querySelector('.eg-grid__item-img'), panelImg, imgURL);

        // Silently upgrade to high-res after movers finish flying
        const hi = new Image();
        hi.onload = () => { panelImgEl.src = src; };
        hi.src = src;
      });
    };

    /* ── Close panel and restore grid ─────────────────────────── */
    const resetView = () => {
      if (isAnimating) return;
      isAnimating = true;

      const allItems = document.querySelectorAll('.eg-grid__item');
      const delays   = staggerDelays(currentItem, allItems);

      gsap.timeline({
        defaults: { duration: cfg.stepDuration, ease: 'expo' },
        onComplete: () => {
          isAnimating = false;
          isPanelOpen = false;
          if (window._gridSmoother) window._gridSmoother.paused(false);
        }
      })
        .to(panel,   { opacity: 0 })
        .set(panel,  { pointerEvents: 'none' })
        .set(panelImg, { clipPath: 'inset(0% 0% 100% 0%)' })
        .set(panelClose, { opacity: 0 })
        .call(() => {
          const el = document.getElementById('rit-panel-img-el');
          if (el) el.src = '';
        })
        .set(allItems, { clipPath: 'none', opacity: 0, scale: 0.85 }, 0)
        .to(allItems, { opacity: 1, scale: 1, delay: i => delays[i] }, '>');

      Object.assign(cfg, origCfg);
    };

    /* ── Event listeners ───────────────────────────────────────── */
    panelClose.addEventListener('click',   () => { if (!isAnimating) resetView(); });
    document.addEventListener('keydown',   e  => { if (e.key === 'Escape' && isPanelOpen && !isAnimating) resetView(); });

    /* ── Wire click handlers after grid is fully built ─────────── */
    const wireClicks = () => {
      document.querySelectorAll('.eg-grid__item').forEach(item => {
        item.addEventListener('click', () => onItemClick(item));
      });
    };

    if (!document.body.classList.contains('loading')) {
      wireClicks();
    } else {
      const obs = new MutationObserver(() => {
        if (!document.body.classList.contains('loading')) {
          obs.disconnect();
          // Wait one tick for init() to finish reorganising items into columns
          setTimeout(wireClicks, 60);
        }
      });
      obs.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    }

  })();
  </script>

  <!-- Shared menu + cursor (explicit link — works whether served via slug or .html directly) -->
  <script defer src="/shared.js"></script>
</body>
</html>
